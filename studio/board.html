<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude's Face — Expression Studio</title>
  <style>
    :root { --orange:#ff5008; --cyan:#22ddff; --bg:#060608; --dim:#8a8a96; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:#e8e8ef;
      font-family: ui-monospace, "IBM Plex Mono", monospace;
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:18px; padding:24px; }
    #stage { display:flex; flex-direction:column; align-items:center; gap:12px; }
    canvas { width:min(82vmin,720px); height:min(82vmin,720px); border-radius:16px;
      box-shadow:0 0 80px var(--glow, rgba(255,80,8,.35)); image-rendering:pixelated;
      background:var(--bg); }
    #status { font-size:13px; color:var(--dim); letter-spacing:.04em; min-height:1.2em; }
    #status b { color:#e8e8ef; font-weight:500; }
    #pins { display:flex; flex-wrap:wrap; gap:6px; justify-content:center;
      max-width:min(82vmin,720px); max-height:124px; overflow-y:auto; padding:4px; }
    #pins button { font:11px ui-monospace,monospace; color:var(--dim);
      background:#111118; border:1px solid #22222c; border-radius:7px;
      padding:4px 8px; cursor:pointer; transition:border-color .15s,color .15s; }
    #pins button:hover { color:#e8e8ef; border-color:#33333f; }
    #pins button.active { color:var(--orange); border-color:var(--orange); }
    #pins button.resume { color:var(--cyan); border-color:#1c4a55; }
    #about { display:flex; gap:16px; align-items:center; max-width:min(82vmin,720px);
      background:#0d0d12; border:1px solid #22222c; border-radius:14px; padding:14px 16px; }
    #about img { width:150px; height:auto; border-radius:10px; background:#fff; flex:none; }
    #about .meta { display:flex; flex-direction:column; gap:7px; min-width:0; }
    #about h2 { margin:0; font-size:15px; font-weight:600; letter-spacing:.02em; }
    #about p { margin:0; font-size:12px; line-height:1.55; color:var(--dim); }
    #about .links { display:flex; flex-wrap:wrap; gap:8px; margin-top:2px; }
    #about a.btn { font:12px ui-monospace,monospace; text-decoration:none; color:var(--dim);
      background:#111118; border:1px solid #22222c; border-radius:8px; padding:5px 10px;
      transition:border-color .15s,color .15s; white-space:nowrap; }
    #about a.btn:hover { color:#e8e8ef; border-color:#33333f; }
    #about a.buy { color:var(--orange); border-color:#5a2a10; }
    #about a.buy:hover { border-color:var(--orange); }
    #about a .net { opacity:.55; }
    @media (max-width:520px){ #about { flex-direction:column; text-align:center; align-items:center; } }
  </style>
</head>
<body>
  <script type="module" src="./studio-nav.js"></script>
  <div id="stage">
    <canvas id="board" width="720" height="720"></canvas>
    <div id="status">starting…</div>
  </div>
  <div id="pins"></div>

  <section id="about">
    <img src="./assets/board.webp"
         alt="Waveshare ESP32-S3-Matrix — an 8×8 (64) WS2812B RGB LED grid on a USB-C ESP32-S3 dev board" />
    <div class="meta">
      <h2>Waveshare ESP32-S3-Matrix</h2>
      <p>The physical panel this mirrors: 64 WS2812B RGB LEDs (8×8) on an ESP32-S3 with a 6-axis IMU.
         Flash the firmware and Claude drives it live — or just watch it here, no hardware needed.</p>
      <div class="links">
        <a class="btn buy" target="_blank" rel="noopener noreferrer"
           href="https://www.amazon.com/Waveshare-ESP32-S3-Matrix-Development-QMI8658C-Bluetooth/dp/B0D3DPLFL8">Buy on Amazon ↗</a>
        <a class="btn" target="_blank" rel="noopener noreferrer"
           href="https://www.amazon.com/vdp/0dd7ba9df4964fdcabd069c1d28e0f5e?aci=amzn1.ive.seller.video.0dd7ba9df4964fdcabd069c1d28e0f5e&product=B0D3DPLFL8&ref=cm_sw_cp_r_ib_dt_1ldndjFwNdf2Z">Watch video ↗</a>
        <a class="btn" target="_blank" rel="noopener noreferrer"
           href="http://esp32matrix.local">Open board UI <span class="net">· your network</span></a>
      </div>
    </div>
  </section>

  <script type="module">
    import { Panel } from "../shared/render.js";
    import { makeWebSimRenderer } from "../shared/renderers/web-sim.js";
    import { FIRMWARE_SIMS } from "../shared/firmware-sims.js";
    import { resolveExpression } from "../shared/expressions.js";
    import { framesFromPx, applyEvent, buildPlaylists, arbitrate, nextIndex, isEngineResponse, mirrorOkAt } from "./board.js";
    import { SHOWCASE } from "./showcase.js";

    // Default params for the few firmware sims that take them (others -> {}).
    const FW_DEFAULTS = {
      frostbite:   { mist: 40, sparkle: 20 },
      fire:        { palette: "classic", intensity: 6 },
      matrix_rain: { theme: "classic", frame_ms: 60 },
      snow:        { frame_ms: 110, flakeColor: "#dce6ff" },
      dancefloor:  { palette: 0, hold: 6 },
    };
    const DWELL_MS = 7000;                 // ambient time per item
    const REDUCE = matchMedia("(prefers-reduced-motion:reduce)").matches;

    const cv = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const pinsEl = document.getElementById("pins");
    const panel = new Panel(cv, { device: cv });
    const webSim = makeWebSimRenderer({ panel, loadExpression: () => null, firmwareSims: FIRMWARE_SIMS });

    // shared runtime state
    let ambItems = [];
    let ambIdx = 0, ambNextAt = 0, curToken = null;
    let pinned = null, lastSseAt = null, lastMirrorAt = 0;  // lastMirrorAt: time of the last GOOD framebuffer poll (grace window)
    let liveAnim = null;  // {type,params} the board is running per the last engine render -> lets the mirror play it locally & smooth

    // control() runs every rAF frame; skip the innerHTML re-parse when unchanged.
    let lastStatus = null;
    function setStatus(html) { if (html !== lastStatus) { statusEl.innerHTML = html; lastStatus = html; } }

    function playItem(item) {
      if (!item) return;
      if (item.kind === "firmware") {
        const sim = FIRMWARE_SIMS[item.name](FW_DEFAULTS[item.name] || {});
        panel.setStepper(() => sim.frame(), sim.frame_ms);
      } else {
        const ex = resolveExpression(item.entry);
        panel.setFrames(ex.frames, ex.frame_ms);
      }
    }

    // Decide what should own the panel each frame and (for ambient/pin) feed it.
    // Mirror + live feed themselves from the poll loop / SSE handler.
    function control(now) {
      const src = arbitrate({ mirrorOk: mirrorOkAt(lastMirrorAt, now), lastSseAt, now, pinned: !!pinned });
      if (src === "mirror") {
        // Smooth path: if the engine told us the board is running a firmware animation we have a JS
        // port of, play that sim LOCALLY at full framerate instead of the choppy ~3fps framebuffer
        // sample. Glyphs / un-ported firmware fall back to the framebuffer static-frame mirror.
        if (liveAnim && FIRMWARE_SIMS[liveAnim.type]) {
          const want = "msim:" + liveAnim.type;
          if (curToken !== want) {
            const sim = FIRMWARE_SIMS[liveAnim.type](liveAnim.params || FW_DEFAULTS[liveAnim.type] || {});
            panel.setStepper(() => sim.frame(), sim.frame_ms);
            curToken = want;
          }
          setStatus("● <b>live · board</b> — mirroring <b>" + liveAnim.type + "</b>");
        } else {
          curToken = "mirror";
          setStatus("● <b>live · board</b> — mirroring the panel");
        }
        return;
      }
      if (src === "live")   { curToken = "live";   setStatus("● <b>live</b> — Claude is driving"); return; }
      if (src === "pin") {
        const want = "pin:" + pinned.name;
        if (curToken !== want) { playItem(pinned); curToken = want; ambNextAt = 0; }
        setStatus("◉ <b>pinned</b> · " + pinned.name);
        return;
      }
      // ambient
      const inAmbient = curToken && curToken.startsWith("amb:");
      if (inAmbient && now < ambNextAt) return;              // keep showing current item
      if (inAmbient) ambIdx = nextIndex(ambIdx, ambItems.length); // dwell elapsed -> advance
      const it = ambItems[ambIdx];
      if (it) { playItem(it); curToken = "amb:" + it.name; ambNextAt = now + DWELL_MS; setStatus("○ <b>ambient</b> · " + it.name); }
      else setStatus("○ <b>ambient</b> — no library");
    }

    // --- build library + pin strip ---
    try {
      const data = await (await fetch("./gallery-data.json")).json();
      const built = buildPlaylists(data, Object.keys(FIRMWARE_SIMS), SHOWCASE);
      ambItems = built.ambient;
      // resume button + one button per renderable item
      const resume = document.createElement("button");
      resume.className = "resume"; resume.textContent = "↻ resume cycle";
      resume.onclick = () => { pinned = null; curToken = null; renderPins(); };
      function renderPins() {
        pinsEl.innerHTML = "";
        pinsEl.appendChild(resume);
        for (const it of built.all) {
          const b = document.createElement("button");
          b.textContent = it.name;
          if (pinned && pinned.name === it.name) b.className = "active";
          b.onclick = () => { pinned = it; curToken = null; renderPins(); };
          pinsEl.appendChild(b);
        }
      }
      renderPins();
    } catch (e) {
      setStatus("○ could not load library (" + e.message + ")");
    }

    // --- reduced motion: show one static frame, no cycling, no engine wiring ---
    if (REDUCE) {
      const it = ambItems[0];
      if (it && it.kind === "expression") { const ex = resolveExpression(it.entry); panel.setFrames(ex.frames.slice(0, 1), 1e9); }
      else if (it) { const sim = FIRMWARE_SIMS[it.name](FW_DEFAULTS[it.name] || {}); panel.setFrames([sim.frame()], 1e9); }
      setStatus("○ <b>ambient</b> · " + (it ? it.name : "—") + " (motion reduced)");
    } else {
      // main render + control loop
      let last = performance.now();
      (function loop(now) { panel.tick(now - last, now); last = now; control(now); requestAnimationFrame(loop); })(last);

      // mirror + SSE wire up ONLY when an engine answers (static host -> pure showcase)
      (async function detectEngineThenWire() {
        let engine = false;
        try { const r = await fetch("/api/framebuffer"); engine = isEngineResponse(r.status); } catch { engine = false; }
        if (!engine) return;  // no engine: stay local-first, no polling, no SSE

        const src = new EventSource("/events");
        src.onmessage = (m) => {
          lastSseAt = performance.now();
          let ev; try { ev = JSON.parse(m.data); } catch { return; }  // ignore malformed
          // Track what the board is showing so the mirror can play firmware locally (see control()):
          // an animation event we can sim -> remember it; a frames event = board switched to a glyph.
          if (ev.kind === "animation" && FIRMWARE_SIMS[ev.type]) liveAnim = { type: ev.type, params: ev.params };
          else if (ev.kind === "frames") liveAnim = null;
          if (arbitrate({ mirrorOk: mirrorOkAt(lastMirrorAt, lastSseAt), lastSseAt, now: lastSseAt, pinned: !!pinned }) === "live") {
            applyEvent(ev, { panel, webSim });
          }
        };

        async function pollFramebuffer() {
          if (document.hidden) return;
          try {
            const r = await fetch("/api/framebuffer");
            if (r.ok) {
              const { px } = await r.json();
              lastMirrorAt = performance.now();
              // Don't clobber a locally-played mirror sim with a static framebuffer frame — that
              // 333ms reset is exactly what made firmware mirrors choppy. Only push the static frame
              // when the mirror is showing a glyph / un-ported firmware (no local sim running).
              const liveSim = liveAnim && FIRMWARE_SIMS[liveAnim.type];
              if (!liveSim && arbitrate({ mirrorOk: mirrorOkAt(lastMirrorAt, lastMirrorAt), lastSseAt, now: lastMirrorAt, pinned: !!pinned }) === "mirror") {
                panel.setFrames([framesFromPx(px)], 1e9);  // static mirror frame, refreshed each poll
              }
            }
            // a non-ok (503) status is NOT a reset: the grace window in mirrorOkAt() holds the last
            // mirror through transient board hiccups, so a brief miss no longer flashes the LIVE layer.
          } catch { /* transient fetch failure — same: let the grace window hold the mirror */ }
        }
        (async function pollLoop() { await pollFramebuffer(); setTimeout(pollLoop, 333); })();
      })();
    }
  </script>
</body>
</html>
