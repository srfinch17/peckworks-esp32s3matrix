<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 16px; }
    .back:hover { color: #999; }
    h1 { font-size: 1.3rem; color: #4499ff; margin-bottom: 24px; }
    .panel { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; max-width: 480px; }
    .group { margin-bottom: 20px; }
    .group label { display: block; font-size: 0.75rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .palette-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pal-btn { border: 2px solid #333; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 0.82rem; font-weight: 600; background: #1a1a1a; color: #bbb; transition: border-color 0.12s, color 0.12s; }
    .pal-btn.active { border-color: #4499ff; color: #fff; }
    .slider-row { display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: #4499ff; cursor: pointer; }
    .hint { font-size: 0.7rem; color: #555; margin-top: 5px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary { background: #0d2a55; color: #88bbff; border: 1px solid #1a4080; border-radius: 7px; padding: 10px 22px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.12s; }
    .btn-primary:hover { background: #122f60; }
    .btn-secondary { background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 7px; padding: 10px 18px; cursor: pointer; font-size: 0.85rem; }
    .btn-secondary:hover { background: #222; }
    .status { font-size: 0.78rem; margin-top: 14px; min-height: 1.2em; color: #00cc66; }
    .status.err { color: #ff5555; }
    .note { font-size: 0.72rem; color: #555; margin-top: 16px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
  <a href="/" class="back">← Home</a>
  <h1>💧 Liquid</h1>

  <div class="panel">

    <div class="group">
      <label>Palette</label>
      <div class="palette-row">
        <button class="pal-btn active" onclick="selectPalette(this,'classic')">🔥 Lava</button>
        <button class="pal-btn"        onclick="selectPalette(this,'blue')">🌊 Ocean</button>
        <button class="pal-btn"        onclick="selectPalette(this,'green')">🧪 Slime</button>
        <button class="pal-btn"        onclick="selectPalette(this,'purple')">🔮 Plasma</button>
      </div>
    </div>

    <div class="group">
      <label>Viscosity — <span id="v-vis">5</span></label>
      <div class="slider-row">
        <input type="range" id="viscosity" min="0" max="10" value="5"
               oninput="document.getElementById('v-vis').textContent = this.value">
      </div>
      <div class="hint">0 = water (sloshy &amp; wavy) &nbsp;·&nbsp; 10 = honey (thick &amp; slow)</div>
    </div>

    <div class="actions">
      <button class="btn-primary"   onclick="sendLiquid()">Send to Display</button>
      <button class="btn-secondary" onclick="clearDisplay()">Clear</button>
    </div>

    <div class="status" id="status"></div>

    <p class="note">
      Tilt the board left or right to slosh the liquid.<br>
      Turbulent areas appear brighter and frothy at the surface.
    </p>
  </div>

  <script>
    let theme = 'classic';

    function selectPalette(btn, t) {
      document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      theme = t;
    }

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function sendLiquid() {
      const viscosity = +document.getElementById('viscosity').value;
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'liquid', theme, viscosity, speed: 50 })
        });
        setStatus(r.ok ? '✓ Liquid running — tilt to slosh' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function clearDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board.', true);
      }
    }
  </script>
  </div>
  <script src="bright.js" data-auto></script>
</body>
</html>
