<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#22ddff">
  <h1>💧 Liquid</h1>

  <div class="panel">

    <div class="subcard">
      <div class="subhead">Palette</div>
      <div class="chips">
        <button class="chip active" onclick="selectPalette(this,'classic')">🔥 Lava</button>
        <button class="chip"        onclick="selectPalette(this,'blue')">🌊 Ocean</button>
        <button class="chip"        onclick="selectPalette(this,'green')">🧪 Slime</button>
        <button class="chip"        onclick="selectPalette(this,'purple')">🔮 Plasma</button>
        <button class="chip"        onclick="selectPalette(this,'custom')">🎨 Custom</button>
      </div>

      <div id="gradient-group" style="display:none; margin-top:14px">
        <label>Custom gradient</label>
        <div id="palSlot" style="margin-top:6px"></div>
        <div class="hint">Top = surface / froth · Bottom = deep</div>
      </div>
    </div>

    <div class="subcard">
      <div class="subhead">Motion</div>
      <div class="row"><label>Viscosity — <span id="v-vis">9</span></label></div>
      <div class="row">
        <input type="range" id="viscosity" min="0" max="10" value="9">
      </div>
      <div class="hint">0 = water (sloshy &amp; wavy) &nbsp;·&nbsp; 10 = honey (thick &amp; slow)</div>
    </div>

    <div class="actions">
      <button class="btn-primary"   onclick="sendLiquid()">Apply to Display</button>
      <button class="btn-secondary" onclick="clearDisplay()">Stop / Clear</button>
      <span class="live-dot">applies live</span>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="palette.js"></script>
  <script>
    let theme = 'classic';
    let live = true;
    let liveTimer = null;
    function liveApply() {
      clearTimeout(liveTimer);
      liveTimer = setTimeout(sendLiquid, 180);
    }

    // Shared palette (S2) for the Custom gradient: [Top, Bottom].
    const pal = Palette.mount('#palSlot', {
      count: 2, labels: ['Top', 'Bottom'], defaults: ['#e6faff', '#0028a0'],
      onChange: () => { if (live) liveApply(); }   // custom-gradient pickers live-apply too
    });

    // Each liquid moves like its real substance: water sloshes freely (thin),
    // lava is thick and slow. Selecting a preset sets a matching viscosity
    // (0 = runny/sloshy, 10 = thick/sluggish); you can still adjust it after.
    const VIS_BY_THEME = { blue: 1, purple: 2, green: 6, classic: 9 };

    function selectPalette(btn, t) {
      document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      theme = t;
      document.getElementById('gradient-group').style.display = (t === 'custom') ? 'block' : 'none';
      if (t in VIS_BY_THEME) {
        const v = VIS_BY_THEME[t];
        document.getElementById('viscosity').value = v;
        document.getElementById('v-vis').textContent = v;
      }
      if (live) liveApply();
    }

    document.getElementById('viscosity').addEventListener('input', e => {
      document.getElementById('v-vis').textContent = e.target.value;
      if (live) liveApply();
    });

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function sendLiquid() {
      const viscosity = +document.getElementById('viscosity').value;
      const body = { type: 'liquid', viscosity, speed: 50 };
      if (theme === 'custom') {
        const c = pal.get();   // [top, bottom]
        body.gradient = true;
        body.top      = c[0];
        body.bottom   = c[1];
      } else {
        body.theme = theme;
      }
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        setStatus(r.ok ? '✓ Liquid running — tilt to slosh' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function clearDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board.', true);
      }
    }
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/animations.html" data-label="Animations"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
