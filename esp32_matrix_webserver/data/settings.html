<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — ESP32 Matrix</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#88bbff">
    <h1>⚙️ Settings</h1>
    <p class="subtitle">Board settings — persisted on the board, survive a reflash</p>

    <form id="f">
      <div class="panel">
        <div class="panel-title">Idle screensaver</div>
        <div class="subcard">
          <div class="row"><label>Enabled</label><input type="checkbox" id="idle_enabled"></div>
        </div>
        <div class="subcard">
          <div class="subhead">Rotation apps</div>
          <div class="chips" id="apps"></div>
        </div>
        <div class="subcard">
          <div class="row"><label>Start after <output id="after_o"></output> s</label></div>
          <div class="row"><input type="range" id="idle_after_secs" min="5" max="900" step="5"></div>
        </div>
        <div class="subcard">
          <div class="row"><label>Re-pick every <output id="rot_o"></output> s</label></div>
          <div class="row"><input type="range" id="idle_rotate_secs" min="10" max="900" step="5"></div>
        </div>
        <div class="subcard">
          <div class="row"><label>Idle brightness <output id="ibri_o"></output></label></div>
          <div class="row"><input type="range" id="idle_brightness" min="1" max="60"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Display</div>
        <div class="subcard">
          <div class="row"><label>Default brightness <output id="dbri_o"></output></label></div>
          <div class="row"><input type="range" id="default_brightness" min="0" max="255"></div>
        </div>
        <div class="subcard">
          <div class="subhead">Default boot animation</div>
          <div class="row"><input type="text" id="boot_animation" placeholder="(blank = resume last)"></div>
        </div>
        <div class="subcard">
          <div class="row"><label>LED calibration correction</label><input type="checkbox" id="calibration_correction"></div>
          <p class="hint">Apply the measured color/brightness correction from the Calibration Lab. Turn off to A/B compare.</p>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Clock</div>
        <div class="subcard">
          <div class="subhead">Timezone (POSIX TZ)</div>
          <div class="row"><input type="text" id="timezone" placeholder="e.g. MST7MDT,M3.2.0,M11.1.0"></div>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary">Save</button>
        <span class="status" id="status"></span>
      </div>
    </form>
  </div>
  <style>
    /* settings-specific: full-width text/range inputs + inline-row checkboxes */
    #f input[type=text] { width: 100%; background: #0d0d0d; border: 1px solid #333; border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 0.85rem; font-family: inherit; }
    #f input[type=range] { width: 100%; flex: 1 1 100%; }
    #f .row { justify-content: space-between; }
    #f output { font-size: 0.85rem; color: var(--accent-page); min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
    #apps label { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-dim); }
  </style>
  <script>
const APPS=["fire","matrix_rain","clock","fireworks","frostbite","snow","dancefloor","claudesweep"];
const $=id=>document.getElementById(id);
function renderApps(csv){
  // Render the UNION of the known apps and whatever the board returned, so an app
  // stored on the board that this page doesn't hardcode is still shown — and never
  // silently dropped when the form is re-saved.
  const stored=(csv||"").split(",").map(s=>s.trim()).filter(Boolean);
  const on=new Set(stored);
  const all=[...new Set([...APPS,...stored])];
  $("apps").innerHTML=all.map(a=>`<label><input type="checkbox" class="app" value="${a}" ${on.has(a)?"checked":""}>${a}</label>`).join("");
}
function bindOut(id,oid){const e=$(id),o=$(oid);const u=()=>o.value=e.value;e.addEventListener("input",u);u();}
async function load(){
  const s=await (await fetch("/api/settings")).json();
  $("idle_enabled").checked=s.idle_enabled;
  $("idle_after_secs").value=s.idle_after_secs;
  $("idle_rotate_secs").value=s.idle_rotate_secs;
  $("idle_brightness").value=s.idle_brightness;
  $("default_brightness").value=s.default_brightness;
  $("boot_animation").value=s.boot_animation||"";
  $("timezone").value=s.timezone||"";
  $("calibration_correction").checked=s.calibration_correction!==false;
  renderApps(s.idle_apps);
  bindOut("idle_after_secs","after_o");bindOut("idle_rotate_secs","rot_o");
  bindOut("idle_brightness","ibri_o");bindOut("default_brightness","dbri_o");
}
$("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const apps=[...document.querySelectorAll(".app:checked")].map(c=>c.value).join(",");
  const body={
    idle_enabled:$("idle_enabled").checked, idle_apps:apps,
    idle_after_secs:+$("idle_after_secs").value, idle_rotate_secs:+$("idle_rotate_secs").value,
    idle_brightness:+$("idle_brightness").value, default_brightness:+$("default_brightness").value,
    boot_animation:$("boot_animation").value.trim(), timezone:$("timezone").value.trim(),
    calibration_correction:$("calibration_correction").checked
  };
  await fetch("/api/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  $("status").textContent="Saved ✓"; setTimeout(()=>$("status").textContent="",1500);
});
load();
  </script>
  <script src="backnav.js" data-auto data-parent="/system.html" data-label="System"></script>
  <script src="header.js" data-auto></script>
</body>
</html>
