<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — ESP32 Matrix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 16px; }
    .back:hover { color: #999; }
    h1 { font-size: 1.4rem; color: #88bbff; letter-spacing: -0.02em; margin-bottom: 4px; }
    .subtitle { color: #555; font-size: 0.82rem; margin-bottom: 24px; }
    .panel { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .panel-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-bottom: 16px; }
    .group { margin-bottom: 18px; }
    .group:last-child { margin-bottom: 0; }
    .group > label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 8px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    input[type=range] { width: 100%; accent-color: #88bbff; cursor: pointer; }
    input[type=text] { width: 100%; background: #0d0d0d; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; padding: 8px 10px; font-size: 0.85rem; }
    input[type=checkbox] { accent-color: #88bbff; width: 16px; height: 16px; cursor: pointer; }
    output { font-size: 0.85rem; color: #88bbff; min-width: 32px; text-align: right; }
    .apps { display: flex; flex-wrap: wrap; gap: 10px 16px; }
    .apps label { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #bbb; }
    .actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    button { background: #112a44; color: #88bbff; border: 1px solid #2266cc; border-radius: 7px; padding: 10px 22px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.12s; }
    button:hover { background: #163a5c; }
    #status { font-size: 0.82rem; color: #00cc66; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="back">← Home</a>
    <h1>⚙️ Settings</h1>
    <p class="subtitle">Board settings — persisted on the board, survive a reflash</p>

    <form id="f">
      <div class="panel">
        <div class="panel-title">Idle screensaver</div>
        <div class="group">
          <label class="row"><span>Enabled</span><input type="checkbox" id="idle_enabled"></label>
        </div>
        <div class="group">
          <label>Rotation apps</label>
          <div class="apps" id="apps"></div>
        </div>
        <div class="group">
          <label class="row"><span>Start after <output id="after_o"></output> s</span></label>
          <input type="range" id="idle_after_secs" min="5" max="900" step="5">
        </div>
        <div class="group">
          <label class="row"><span>Re-pick every <output id="rot_o"></output> s</span></label>
          <input type="range" id="idle_rotate_secs" min="10" max="900" step="5">
        </div>
        <div class="group">
          <label class="row"><span>Idle brightness <output id="ibri_o"></output></span></label>
          <input type="range" id="idle_brightness" min="1" max="60">
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Display</div>
        <div class="group">
          <label class="row"><span>Default brightness <output id="dbri_o"></output></span></label>
          <input type="range" id="default_brightness" min="0" max="255">
        </div>
        <div class="group">
          <label>Default boot animation</label>
          <input type="text" id="boot_animation" placeholder="(blank = resume last)">
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Clock</div>
        <div class="group">
          <label>Timezone (POSIX TZ)</label>
          <input type="text" id="timezone" placeholder="e.g. MST7MDT,M3.2.0,M11.1.0">
        </div>
      </div>

      <div class="actions">
        <button type="submit">Save</button>
        <span id="status"></span>
      </div>
    </form>
  </div>
  <script>
const APPS=["fire","matrix_rain","clock","fireworks","frostbite","snow","dancefloor","claudesweep"];
const $=id=>document.getElementById(id);
function renderApps(csv){
  // Render the UNION of the known apps and whatever the board returned, so an app
  // stored on the board that this page doesn't hardcode is still shown — and never
  // silently dropped when the form is re-saved.
  const stored=(csv||"").split(",").map(s=>s.trim()).filter(Boolean);
  const on=new Set(stored);
  const all=[...new Set([...APPS,...stored])];
  $("apps").innerHTML=all.map(a=>`<label><input type="checkbox" class="app" value="${a}" ${on.has(a)?"checked":""}>${a}</label>`).join("");
}
function bindOut(id,oid){const e=$(id),o=$(oid);const u=()=>o.value=e.value;e.addEventListener("input",u);u();}
async function load(){
  const s=await (await fetch("/api/settings")).json();
  $("idle_enabled").checked=s.idle_enabled;
  $("idle_after_secs").value=s.idle_after_secs;
  $("idle_rotate_secs").value=s.idle_rotate_secs;
  $("idle_brightness").value=s.idle_brightness;
  $("default_brightness").value=s.default_brightness;
  $("boot_animation").value=s.boot_animation||"";
  $("timezone").value=s.timezone||"";
  renderApps(s.idle_apps);
  bindOut("idle_after_secs","after_o");bindOut("idle_rotate_secs","rot_o");
  bindOut("idle_brightness","ibri_o");bindOut("default_brightness","dbri_o");
}
$("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const apps=[...document.querySelectorAll(".app:checked")].map(c=>c.value).join(",");
  const body={
    idle_enabled:$("idle_enabled").checked, idle_apps:apps,
    idle_after_secs:+$("idle_after_secs").value, idle_rotate_secs:+$("idle_rotate_secs").value,
    idle_brightness:+$("idle_brightness").value, default_brightness:+$("default_brightness").value,
    boot_animation:$("boot_animation").value.trim(), timezone:$("timezone").value.trim()
  };
  await fetch("/api/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  $("status").textContent="Saved ✓"; setTimeout(()=>$("status").textContent="",1500);
});
load();
  </script>
  <script src="header.js" data-auto></script>
</body>
</html>
