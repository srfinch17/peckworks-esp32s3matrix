<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireworks 2</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#c98bff">
  <h1>🎇 Fireworks 2</h1>

  <div class="panel">
    <div class="layout">
      <div class="preview-frame">
        <canvas id="prev" class="preview" width="240" height="240"></canvas>
        <div class="preview-label">Live preview</div>
      </div>

      <div class="controls">
        <div class="subcard">
          <div class="subhead">Preset Shows — <span id="fw2-pal-name">Custom</span></div>
          <div class="df-pal-grid" id="fw2-pal-grid"></div>
        </div>

        <div class="subcard">
          <div class="subhead">Tip Colors</div>
          <div class="color-row">
            <div class="picker-group"><label>Tip 1</label><input type="color" id="fw2-c1" value="#ff3200"></div>
            <div class="picker-group"><label>Tip 2</label><input type="color" id="fw2-c2" value="#ffc800"></div>
            <div class="picker-group"><label>Tip 3</label><input type="color" id="fw2-c3" value="#0064ff"></div>
          </div>
        </div>

        <div class="subcard">
          <div class="subhead">Motion</div>
          <div class="row"><label>Frame Rate — <span id="v-speed">5</span> fps</label></div>
          <div class="row"><span style="font-size:.68rem;color:#555">Slow</span><input type="range" id="speed" min="1" max="50" value="5"><span style="font-size:.68rem;color:#555">Fast</span></div>
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="applyAnimation()">Apply to Display</button>
          <button class="btn-secondary" onclick="stopDisplay()">Stop / Clear</button>
          <span class="live-dot">applies live</span>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>
  </div>

  <script src="palettes.js"></script>
  <script src="previews.js"></script>
  <script>
    let live = true, liveTimer = null;
    const getEl = id => document.getElementById(id);
    function setStatus(m, e) { const el = getEl('status'); el.textContent = m; el.className = 'status' + (e ? ' err' : ''); }
    function liveApply() { clearTimeout(liveTimer); liveTimer = setTimeout(applyAnimation, 180); }

    function buildFwPresetGrid(gridId, nameId, pickerIds) {
      const grid = getEl(gridId);
      FW_PRESETS.forEach(([name, c1, c2, c3], i) => {
        const el = document.createElement('div');
        el.className = 'df-swatch';
        el.title = name;
        el.style.background = `linear-gradient(to right,${c1} 33%,${c2} 33% 66%,${c3} 66%)`;
        el.onclick = () => {
          grid.querySelectorAll('.df-swatch').forEach((s, j) => s.classList.toggle('active', j === i));
          getEl(nameId).textContent = name;
          getEl(pickerIds[0]).value = c1;
          getEl(pickerIds[1]).value = c2;
          getEl(pickerIds[2]).value = c3;
          if (live) liveApply();
        };
        grid.appendChild(el);
      });
    }
    buildFwPresetGrid('fw2-pal-grid', 'fw2-pal-name', ['fw2-c1', 'fw2-c2', 'fw2-c3']);
    function clearFw2Preset() {
      getEl('fw2-pal-grid').querySelectorAll('.df-swatch').forEach(el => el.classList.remove('active'));
      getEl('fw2-pal-name').textContent = 'Custom';
    }

    ['fw2-c1', 'fw2-c2', 'fw2-c3'].forEach(id => getEl(id).addEventListener('input', () => { clearFw2Preset(); if (live) liveApply(); }));
    getEl('speed').addEventListener('input', e => {
      getEl('v-speed').textContent = e.target.value;
      if (live) liveApply();
    });

    function buildPayload() {
      const body = { type: 'fireworks2', speed: Math.round(1000 / +getEl('speed').value) };
      body.color1 = getEl('fw2-c1').value;
      body.color2 = getEl('fw2-c2').value;
      body.color3 = getEl('fw2-c3').value;
      return body;
    }

    async function applyAnimation() {
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(buildPayload())
        });
        setStatus(r.ok ? '✓ Running: fireworks2' : 'Error: HTTP ' + r.status, !r.ok);
      } catch { setStatus('Cannot reach board — check WiFi connection.', true); }
    }
    async function stopDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch { setStatus('Cannot reach board — check WiFi connection.', true); }
    }

    MatrixPreview.start(getEl('prev'), 'fireworks2');
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/animations.html" data-label="Animations"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
