<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snow</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#aaccff">
  <h1>❄️ Snow</h1>

  <div class="panel">
    <div class="layout">
      <div class="preview-frame">
        <canvas id="preview" class="preview" width="288" height="288"></canvas>
        <div class="preview-label">Live preview</div>
      </div>

      <div class="controls">
        <div class="subcard">
          <div class="subhead">Color</div>
          <div class="chips">
            <button class="chip active" data-mode="single">Single hue</button>
            <button class="chip"        data-mode="confetti">Confetti</button>
          </div>
          <div class="hint">Single hue = one random bri-5-safe color per launch (re-rolls each Apply). Confetti = every flake its own color.</div>
        </div>

        <div class="subcard">
          <div class="subhead">Motion</div>
          <div class="row"><label>Speed — <span id="v-speed">10</span> fps</label></div>
          <div class="row">
            <span style="font-size:.68rem;color:#555">Slow</span>
            <input type="range" id="speed" min="5" max="25" value="10">
            <span style="font-size:.68rem;color:#555">Fast</span>
          </div>
          <div class="hint">Gentler = more like real snow. Flakes also vary their own speed randomly.</div>
        </div>

        <div class="subcard">
          <div class="subhead">Brightness</div>
          <div id="brightnessSlot"></div>
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="applyToDisplay()">Apply to Display</button>
          <button class="btn-secondary" onclick="stopDisplay()">Stop / Clear</button>
          <span class="live-dot">applies live</span>
        </div>

        <div class="status" id="status"></div>
      </div>
    </div>
  </div>

  <script>
    const W = 8, H = 8, CELL = 36, FLAKES = 6;

    // Mirrors SNOW_PALETTE / SNOW_FLOOR_TOP in anim_snow.ino exactly.
    const PALETTE = [
      [255, 255, 255], [255, 40, 40], [255, 130, 0], [255, 200, 40],
      [80, 255, 40], [60, 255, 140], [0, 230, 230], [60, 140, 255],
      [40, 70, 255], [160, 40, 255], [255, 60, 230], [255, 80, 150]
    ];
    const FLOOR_TOP = [7, 7, 6, 7, 7, 6, 7, 7];

    let mode      = 'single';            // 'single' | 'confetti'
    let speedMs   = Math.round(1000 / 10);
    let hue       = PALETTE[1];          // single-hue: chosen color (re-rolled on Apply / toggle)
    let floorRGB  = hue;
    let live      = true;
    let liveTimer = null;
    function liveApply() {
      clearTimeout(liveTimer);
      liveTimer = setTimeout(applyToDisplay, 180);
    }

    function rollHue() {
      hue      = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      floorRGB = mode === 'confetti' ? [210, 220, 255] : hue;
    }
    function flakeColor() {
      return mode === 'confetti' ? PALETTE[Math.floor(Math.random() * PALETTE.length)] : hue;
    }

    function spawn(stagger) {
      return {
        x: Math.floor(Math.random() * W),
        y: stagger ? -Math.floor(Math.random() * H + 1) : -1,
        tick: 0,
        speed: Math.floor(Math.random() * 3) + 1,   // 1–3 ticks per step
        color: flakeColor()
      };
    }
    let flakes = Array.from({ length: FLAKES }, () => spawn(true));

    function step() {
      for (let i = 0; i < flakes.length; i++) {
        const f = flakes[i];
        f.tick++;
        if (f.tick >= f.speed) { f.tick = 0; f.y++; }
        if (f.y >= FLOOR_TOP[f.x]) flakes[i] = spawn(false);
      }
    }

    const canvas = document.getElementById('preview');
    const ctx    = canvas.getContext('2d');

    function px(x, y, rgb) {
      ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W * CELL, H * CELL);

      // Fixed snow bank
      for (let x = 0; x < W; x++)
        for (let y = FLOOR_TOP[x]; y < H; y++) px(x, y, floorRGB);

      // Flakes (canvas always full brightness; board brightness only affects LEDs)
      for (const f of flakes)
        if (f.y >= 0 && f.y < FLOOR_TOP[f.x]) px(f.x, f.y, f.color);
    }

    let lastStep = 0;
    function animate(ts) {
      if (ts - lastStep >= speedMs) { lastStep = ts; step(); render(); }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── UI wiring ─────────────────────────────────────────────

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    document.querySelectorAll('.chip[data-mode]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-mode]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        rollHue();
        if (live) liveApply();
      });
    });

    document.getElementById('speed').addEventListener('input', e => {
      speedMs = Math.round(1000 / +e.target.value);
      document.getElementById('v-speed').textContent = e.target.value;
      if (live) liveApply();
    });

    async function applyToDisplay() {
      rollHue();   // re-roll the single hue each Apply, mirroring the board's per-launch seed
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'snow', confetti: mode === 'confetti', speed: speedMs })
        });
        setStatus(r.ok ? '✓ Applied to display.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function stopDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/animations.html" data-label="Animations"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
