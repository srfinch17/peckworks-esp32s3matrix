<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 16px; }
    .back:hover { color: #999; }
    h1 { font-size: 1.3rem; color: #ff6600; margin-bottom: 20px; }
    .layout { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; }
    .preview-wrap { flex: 0 0 auto; }
    .preview-label { font-size: 0.68rem; color: #444; text-align: center; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.07em; }
    canvas { display: block; border-radius: 8px; border: 1px solid #1e1e1e; image-rendering: pixelated; }
    .controls { flex: 1; min-width: 240px; max-width: 380px; }
    .group { margin-bottom: 20px; }
    .group > label { display: block; font-size: 0.72rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 9px; }
    .themes { display: flex; gap: 8px; flex-wrap: wrap; }
    .theme-btn { background: #161616; color: #888; border: 1px solid #2a2a2a; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.8rem; transition: all 0.12s; }
    .theme-btn:hover { border-color: #3a3a3a; color: #aaa; }
    .theme-btn.active                    { background: #1e1e1e; color: #ccc; border-color: #555; }
    .theme-btn[data-theme="classic"].active { border-color: #cc4400; color: #ff7733; }
    .theme-btn[data-theme="blue"].active    { border-color: #2266cc; color: #5599ff; }
    .theme-btn[data-theme="green"].active   { border-color: #226633; color: #44cc66; }
    .theme-btn[data-theme="purple"].active  { border-color: #552288; color: #aa66ff; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { flex: 1; accent-color: #ff6600; cursor: pointer; }
    .val { font-size: 0.85rem; color: #666; min-width: 28px; text-align: right; }
    .hint { font-size: 0.68rem; color: #444; margin-top: 5px; }
    .toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .toggle-row input[type=checkbox] { width: 15px; height: 15px; accent-color: #ff6600; cursor: pointer; }
    .toggle-row span { font-size: 0.82rem; color: #888; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
    .btn-apply { background: #7a2200; color: #ff8855; border: 1px solid #aa3300; border-radius: 7px; padding: 10px 22px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.12s; }
    .btn-apply:hover { background: #882500; }
    .btn-stop { background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 7px; padding: 10px 18px; cursor: pointer; font-size: 0.85rem; }
    .btn-stop:hover { background: #222; }
    .status { font-size: 0.78rem; margin-top: 14px; min-height: 1.2em; color: #00cc66; }
    .status.err { color: #ff5555; }
  </style>
</head>
<body>
  <a href="/" class="back">← Home</a>
  <h1>🔥 Fire Controller</h1>

  <div class="layout">
    <div class="preview-wrap">
      <!-- 8 cells × 36px = 288px canvas — matches the 8×8 LED matrix -->
      <canvas id="preview" width="288" height="288"></canvas>
      <div class="preview-label">Browser preview</div>
    </div>

    <div class="controls">
      <div class="group">
        <label>Theme</label>
        <div class="themes">
          <button class="theme-btn active" data-theme="classic">Classic</button>
          <button class="theme-btn"        data-theme="blue">Blue</button>
          <button class="theme-btn"        data-theme="green">Green</button>
          <button class="theme-btn"        data-theme="purple">Purple</button>
        </div>
      </div>

      <div class="group">
        <label>Intensity — <span id="v-intensity">6</span> / 10</label>
        <div class="slider-row">
          <input type="range" id="intensity" min="1" max="10" value="6">
        </div>
        <div class="hint">Higher = hotter sparks, brighter flames</div>
      </div>

      <div class="group">
        <label>Tendrils — <span id="v-tendrils">0</span> / 10</label>
        <div class="slider-row">
          <input type="range" id="tendrils" min="0" max="10" value="0">
        </div>
        <div class="hint">0 = broad roaring flame &nbsp;&nbsp; 10 = wispy tendrils</div>
      </div>

      <div class="group">
        <label>Speed — <span id="v-speed">15</span> fps</label>
        <div class="slider-row">
          <input type="range" id="speed" min="30" max="200" value="66">
        </div>
      </div>

      <div class="group">
        <label>Sparks — <span id="v-sparks">0</span> / 10</label>
        <div class="slider-row">
          <input type="range" id="sparks" min="0" max="10" value="0">
        </div>
        <div class="hint">0 = none &nbsp;&nbsp; 10 = lots of floating sparks above the flame</div>
      </div>

      <div class="group">
        <label class="toggle-row">
          <input type="checkbox" id="autosync">
          <span>Auto-sync (send to display on every change)</span>
        </label>
      </div>

      <div class="actions">
        <button class="btn-apply" onclick="applyToDisplay()">Apply to Display</button>
        <button class="btn-stop"  onclick="stopDisplay()">Stop / Clear</button>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    // ── Fire simulation ───────────────────────────────────────────────────────
    //
    // This is a JavaScript port of the C++ fire algorithm in
    // esp32_matrix_webserver.ino (Section 6: FIRE ANIMATION).
    // Both use the same math, so the canvas preview matches the physical board.

    const W = 8, H = 8, CELL = 36; // 8×8 grid, each cell 36×36 pixels

    // Color palettes — 8 stops from cold (index 0) to hot (index 7)
    // These match the PROGMEM palette arrays in the firmware exactly.
    // These must match the PROGMEM palette arrays in the firmware exactly.
    const PALETTES = {
      classic: [[0,0,0],[0,0,0],[160,0,0],[255,50,0],[255,170,0],[255,230,0],[255,255,120],[255,255,230]],
      blue:    [[0,0,0],[0,0,0],[0,0,160],[0,40,255],[0,160,255],[0,230,255],[120,245,255],[230,250,255]],
      green:   [[0,0,0],[0,0,0],[0,130,0],[40,240,0],[130,255,0],[210,255,50],[240,255,160],[250,255,230]],
      purple:  [[0,0,0],[0,0,0],[90,0,150],[180,0,255],[230,50,255],[245,140,255],[255,210,255],[255,240,255]]
    };

    // Per-cell state arrays (64 cells total)
    let heat      = new Uint8Array(W * H);   // 0=cold, 255=hottest
    let colDrift  = new Int8Array(W);         // per-column drift direction: -1, 0, or +1
    let colActive = new Uint8Array(W).fill(1); // whether each column is producing fire

    // Current parameter values — updated by sliders/toggles
    let theme         = 'classic';
    let intensity     = 6;
    let tendrils      = 0;
    let speedMs       = 66;
    let autoSync      = false;
    let sparkRate = 0; // 0 = off, 1–10 = spawn frequency

    // Spark particle system — mirrors stepSparks() in the firmware.
    // Each entry: { x, y, vx, vy, life, maxLife }
    let sparkParticles = [];

    function stepSparksJS() {
      // Spawn one new spark if a hot cell exists in the top 3 rows
      if (sparkParticles.length < MAX_SPARKS_JS && Math.random() < sparkRate * 0.10) {
        const sx = (Math.random() * W) | 0;
        const sy = (Math.random() * 3) | 0;
        if (heat[sy * W + sx] >= 30) {
          const ml = 5 + ((Math.random() * 7) | 0);
          sparkParticles.push({
            x: sx, y: sy,
            vy: -(0.15 + ((Math.random() * 5) | 0) * 0.07),
            vx: (((Math.random() * 5) | 0) - 2) * 0.12,
            life: ml, maxLife: ml
          });
        }
      }
      // Update each spark
      sparkParticles = sparkParticles.filter(s => {
        s.y += s.vy;
        s.x += s.vx;
        s.life--;
        if (s.y < -1) return false;
        if (s.x < 0 || s.x >= W) { s.vx = -s.vx; s.x = Math.max(0, Math.min(W - 1, s.x)); }
        return s.life > 0;
      });
    }

    function renderSparksCanvas() {
      for (const s of sparkParticles) {
        const px = Math.round(s.x);
        const py = Math.round(s.y);
        if (px < 0 || px >= W || py < 0 || py >= H) continue;
        const t = s.life / s.maxLife;
        const [r, g, b] = heatToColor((220 * t) | 0);
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(px * CELL, py * CELL, CELL, CELL);
      }
    }

    const MAX_SPARKS_JS = 8;

    // ── Math helpers ──────────────────────────────────────────────────────────

    function r8() { return (Math.random() * 256) | 0; }
    function qadd8(a, b) { return Math.min(255, a + b); }

    // Interpolate a heat value (0–255) to an RGB color using the active palette
    function heatToColor(h) {
      const pal = PALETTES[theme];
      const t   = h / 255;
      const pos = t * (pal.length - 1);
      const lo  = pos | 0;
      const hi  = Math.min(lo + 1, pal.length - 1);
      const f   = pos - lo;
      return [
        pal[lo][0] + (pal[hi][0] - pal[lo][0]) * f,
        pal[lo][1] + (pal[hi][1] - pal[lo][1]) * f,
        pal[lo][2] + (pal[hi][2] - pal[lo][2]) * f
      ];
    }

    // ── Fire step — mirrors stepFireFrame() in the firmware ───────────────────

    function stepFire() {
      const w = tendrils / 10; // 0.0 = broad, 1.0 = fully wispy

      // Step 1: Update per-column state (random drift and active/inactive toggling)
      for (let x = 0; x < W; x++) {
        if (r8() < 20 + w * 30)
          colActive[x] = r8() > w * 140 ? 1 : 0;
        if (r8() < w * 76) {
          colDrift[x] += r8() < 128 ? -1 : 1;
          colDrift[x] = Math.max(-1, Math.min(1, colDrift[x]));
        }
        if (r8() < 38) colDrift[x] = 0;
      }

      // Step 2: Ignite sparks at the bottom row
      for (let x = 0; x < W; x++) {
        const boost  = colActive[x] ? 1 : 1 - w * 0.85;
        const thresh = (100 + intensity * 15) * boost;
        if (r8() < thresh) {
          heat[(H - 1) * W + x] = qadd8(100, r8() % (intensity * 15 + 40));
        } else if (w > 0 && !colActive[x]) {
          heat[(H - 1) * W + x] = (heat[(H - 1) * W + x] * (1 - w * 0.6)) | 0;
        }
      }

      // Step 3: Propagate heat upward with cooling
      for (let y = 0; y < H - 1; y++) {
        for (let x = 0; x < W; x++) {
          const below    = heat[(y + 1) * W + x];
          const belowL   = heat[(y + 1) * W + Math.max(0, x - 1)];
          const belowR   = heat[(y + 1) * W + Math.min(W - 1, x + 1)];
          const broadAvg = (below * 2 + belowL + belowR) / 4;

          const dx       = Math.max(0, Math.min(W - 1, x + colDrift[x]));
          const wispyAvg = (below * 3 + heat[(y + 1) * W + dx]) / 4;

          const avg       = broadAvg * (1 - w) + wispyAvg * w;
          const baseDecay = 20 + r8() % Math.max(1, 35 - intensity * 2);
          const wDecay    = colActive[x]
            ? baseDecay * (1 - w * 0.2)
            : baseDecay * (1 + w * 1.5);
          const decay = baseDecay * (1 - w) + wDecay * w;

          heat[y * W + x] = avg > decay ? (avg - decay) | 0 : 0;
        }
      }
    }

    // ── Canvas render ─────────────────────────────────────────────────────────

    const canvas = document.getElementById('preview');
    const ctx    = canvas.getContext('2d');

    function renderCanvas() {
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const [r, g, b] = heatToColor(heat[y * W + x]);
          ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
          ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        }
      }
    }

    // Main animation loop — uses requestAnimationFrame (no setInterval/setTimeout)
    let lastStep = 0;
    function animate(ts) {
      if (ts - lastStep >= speedMs) {
        lastStep = ts;
        stepFire();
        if (sparkRate > 0) stepSparksJS();
        renderCanvas();
        if (sparkRate > 0) renderSparksCanvas();
      }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── UI wiring ─────────────────────────────────────────────────────────────

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    // Theme buttons
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        theme = btn.dataset.theme;
        if (autoSync) applyToDisplay();
      });
    });

    document.getElementById('intensity').addEventListener('input', e => {
      intensity = +e.target.value;
      document.getElementById('v-intensity').textContent = intensity;
      if (autoSync) applyToDisplay();
    });

    document.getElementById('tendrils').addEventListener('input', e => {
      tendrils = +e.target.value;
      document.getElementById('v-tendrils').textContent = tendrils;
      if (autoSync) applyToDisplay();
    });

    // Speed slider stores delay in ms; display the inverse (fps) to the user
    document.getElementById('speed').addEventListener('input', e => {
      speedMs = +e.target.value;
      document.getElementById('v-speed').textContent = Math.round(1000 / speedMs);
      if (autoSync) applyToDisplay();
    });

    document.getElementById('sparks').addEventListener('input', e => {
      sparkRate = +e.target.value;
      document.getElementById('v-sparks').textContent = sparkRate;
      if (sparkRate === 0) sparkParticles = []; // clear preview sparks on disable
      if (autoSync) applyToDisplay();
    });

    document.getElementById('autosync').addEventListener('change', e => {
      autoSync = e.target.checked;
      if (autoSync) applyToDisplay(); // immediately send current settings
    });

    // ── API calls ─────────────────────────────────────────────────────────────

    async function applyToDisplay() {
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type:      'fire',
            speed:     speedMs,
            theme:     theme,
            intensity: intensity,
            tendrils:  tendrils,
            sparks:    sparkRate
          })
        });
        setStatus(r.ok ? '✓ Applied to display.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function stopDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }
  </script>
</body>
</html>
