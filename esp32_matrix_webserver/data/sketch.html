<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch — ESP32 Matrix</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#b050ff">
    <h1>🎨 Sketch</h1>

    <div class="panel">
      <div class="layout">
        <div id="grid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;width:320px;max-width:80vw;aspect-ratio:1;background:#050505;padding:3px;border-radius:8px;touch-action:none;user-select:none"></div>
        <div class="preview-frame">
          <canvas id="preview" class="preview" width="8" height="8" style="width:144px;height:144px"></canvas>
          <div class="preview-label">Board preview<br>(at current brightness)</div>
        </div>
      </div>

      <div class="subcard" style="margin-top:16px">
        <div class="subhead">Tools</div>
        <div class="color-row" style="margin-bottom:12px">
          <label>Color</label>
          <input type="color" id="picker" value="#ff3030">
          <div class="chips" id="swatches"></div>
          <button class="btn-secondary" id="eraser" onclick="toggleEraser()">Eraser</button>
        </div>
        <div class="actions" style="margin-top:0">
          <button class="btn-primary" onclick="sendToBoard()">Send to Board</button>
          <button class="btn-secondary" onclick="fillAll()">Fill</button>
          <button class="btn-secondary" onclick="clearGrid()">Clear</button>
        </div>
      </div>

      <div class="subcard">
        <div class="subhead">Starter images — click one to load, then edit</div>
        <div class="chips" id="gallery" style="gap:6px"></div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="ledsim.js"></script>
  <script src="bright.js" data-auto></script>
  <script>
    const N = 8, OFF = '#000000';
    const SWATCHES = ['#ffffff','#ff3030','#ff8800','#ffe000','#22cc44','#00cccc','#2060ff','#8000ff','#ff30c0','#000000'];

    let cells = new Array(N * N).fill(OFF);
    let curColor = document.getElementById('picker').value;
    let erasing = false;
    let painting = false;

    const gridEl = document.getElementById('grid');
    const cellEls = [];
    const prev = document.getElementById('preview');
    const pctx = prev.getContext('2d');

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg; el.className = 'status' + (isErr ? ' err' : '');
    }

    // ── Build the grid ──────────────────────────────────────────
    for (let i = 0; i < N * N; i++) {
      const c = document.createElement('div');
      c.dataset.i = i;
      c.style.borderRadius = '3px';
      c.style.background = '#000';
      c.style.cursor = 'crosshair';
      c.style.aspectRatio = '1';
      gridEl.appendChild(c);
      cellEls.push(c);
    }

    function paintCell(i) {
      const color = erasing ? OFF : curColor;
      if (cells[i] === color) return;
      cells[i] = color;
      cellEls[i].style.background = color;
      save();
      drawPreview();
    }

    // Mouse: click + drag to paint.
    gridEl.addEventListener('mousedown', e => {
      if (!e.target.dataset.i) return;
      painting = true; paintCell(+e.target.dataset.i); e.preventDefault();
    });
    gridEl.addEventListener('mouseover', e => {
      if (painting && e.target.dataset.i) paintCell(+e.target.dataset.i);
    });
    window.addEventListener('mouseup', () => { painting = false; });

    // Touch: drag paints whatever cell is under the finger.
    gridEl.addEventListener('touchstart', onTouch, { passive: false });
    gridEl.addEventListener('touchmove', onTouch, { passive: false });
    function onTouch(e) {
      e.preventDefault();
      const t = e.touches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el && el.dataset && el.dataset.i) paintCell(+el.dataset.i);
    }

    // ── Board preview via LedSim (true appearance at current brightness) ──
    function drawPreview(b) {
      const bri = (typeof b === 'number') ? b : (window.LedSim ? LedSim.bri() : 255);
      for (let i = 0; i < N * N; i++) {
        pctx.fillStyle = window.LedSim ? LedSim.previewColor(cells[i], bri) : cells[i];
        pctx.fillRect(i % N, (i / N) | 0, 1, 1);
      }
    }
    if (window.LedSim) LedSim.onChange(drawPreview);

    // ── Swatches ────────────────────────────────────────────────
    const swEl = document.getElementById('swatches');
    SWATCHES.forEach(hex => {
      const s = document.createElement('div');
      s.style.width = '26px'; s.style.height = '26px'; s.style.borderRadius = '6px';
      s.style.border = '2px solid #2a2a2a'; s.style.cursor = 'pointer';
      s.dataset.sw = '1';
      s.style.background = hex; s.title = hex;
      s.onclick = () => {
        erasing = false; document.getElementById('eraser').classList.remove('active');
        curColor = hex; document.getElementById('picker').value = hex;
        markSwatch();
      };
      swEl.appendChild(s);
    });
    function markSwatch() {
      [...swEl.children].forEach(s => {
        const on = s.style.background && rgbToHex(s.style.background) === curColor.toLowerCase();
        s.style.borderColor = on ? '#fff' : '#2a2a2a';
      });
    }
    function rgbToHex(rgb) {
      const m = rgb.match(/\d+/g); if (!m) return rgb;
      return '#' + m.slice(0,3).map(v => (+v).toString(16).padStart(2,'0')).join('');
    }

    document.getElementById('picker').addEventListener('input', e => {
      erasing = false; document.getElementById('eraser').classList.remove('active');
      curColor = e.target.value; markSwatch();
    });

    function toggleEraser() {
      erasing = !erasing;
      document.getElementById('eraser').classList.toggle('active', erasing);
    }

    // ── Actions ─────────────────────────────────────────────────
    function fillAll() {
      const color = erasing ? OFF : curColor;
      cells = new Array(N * N).fill(color);
      cellEls.forEach(c => c.style.background = color);
      save(); drawPreview();
    }
    function clearGrid() {
      cells = new Array(N * N).fill(OFF);
      cellEls.forEach(c => c.style.background = OFF);
      save(); drawPreview();
    }
    async function sendToBoard() {
      const matrix = [];
      for (let y = 0; y < N; y++) matrix.push(cells.slice(y * N, y * N + N));
      try {
        const r = await fetch('/api/display/matrix', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ matrix })
        });
        setStatus(r.ok ? '✓ Sent to board.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi.', true);
      }
    }

    // ── Persistence ─────────────────────────────────────────────
    function save() { try { localStorage.setItem('sketch_grid', JSON.stringify(cells)); } catch (e) {} }
    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem('sketch_grid'));
        if (Array.isArray(saved) && saved.length === N * N) cells = saved;
      } catch (e) {}
      cellEls.forEach((c, i) => c.style.background = cells[i]);
    }

    // ── Starter images ──────────────────────────────────────────
    // Pixel art as 8 rows of 8 chars; KEY maps each char to a hex color.
    const KEY = {
      '.': '#000000', 'W': '#ffffff', 's': '#c8d0d8', 'k': '#555560', 'd': '#2a2a32',
      'R': '#ff2828', 'r': '#9a0c0c', 'o': '#ff7b00', 'f': '#ffb030', 'y': '#ffd000', 'Y': '#fff3a0',
      'g': '#22cc44', 'G': '#0a7a22', 'm': '#50ffd0',
      'c': '#30e0ff', 'C': '#bdf4ff', 'b': '#2060ff', 'B': '#0a2a90',
      'p': '#b050ff', 'u': '#5010a0', 'P': '#ff5ad0', 'n': '#8a5a2a', 'a': '#ff6a14'
    };
    // Faceted gem template — E=body, e=edge, #=sparkle. Keeps the gems cohesive.
    const GEM = ["..eeee..", ".eEEEEe.", "eEE#EEEe", "eEEEEEEe", ".eEEEEe.", ".eEEEEe.", "..eEEe..", "...ee..."];
    const sub = (rows, map) => rows.map(r => r.split('').map(ch => map[ch] || ch).join(''));
    const gem  = (E, e, s) => sub(GEM, { E, e, '#': s });
    // 4/5-point star template — E=body, #=sparkle core.
    const STAR = ["...EE...", "...EE...", "EEEEEEEE", ".EEEEEE.", "..E##E..", ".EEEEEE.", ".EE..EE.", "EE....EE"];
    const star = (E, s) => sub(STAR, { E, '#': s });

    const STARTERS = [
      { name: 'Rocket',   rows: ["...RR...", "..RWWR..", "..WCCW..", "..WWWW..", "..WWWW..", ".RWWWWR.", "R..WW..R", "...ff..."] },
      { name: 'Claude',   rows: ["........", "..aaaa..", ".aaaaaa.", ".a.aa.a.", "aaaaaaaa", ".aaaaaa.", ".aa..aa.", "........"] },
      { name: 'Star',     rows: star('y', 'Y') },
      { name: 'Heart',    rows: ["........", ".RR..RR.", "RRRRRRRR", "RRRRRRRR", ".RRRRRR.", "..RRRR..", "...RR...", "........"] },
      { name: 'Smiley',   rows: ["..yyyy..", ".yyyyyy.", "yyyyyyyy", "yydyydyy", "yyyyyyyy", "yyyyyyyy", ".yddddy.", "..yyyy.."] },
      { name: 'Invader',  rows: ["..g..g..", ".gggggg.", "gg.gg.gg", "gggggggg", ".g.gg.g.", "g.g..g.g", ".g....g.", "g......g"] },
      { name: 'Mushroom', rows: ["..RRRR..", ".RRWRRR.", "RWRRRRWR", "RRRRRRRR", "..YYYY..", "..YYYY..", "..YYYY..", "..YYYY.."] },
      { name: 'Bolt',     rows: ["...yyy..", "..yyy...", ".yyy....", "yyyyyy..", "...yyy..", "..yyy...", ".yy.....", "yy......"] },
      { name: 'Skull',    rows: [".WWWWWW.", "WWWWWWWW", "WWdWWdWW", "WWdWWdWW", "WWWWWWWW", "WWWddWWW", ".WWWWWW.", ".W.W.W.W"] },
      { name: 'Ghost',    rows: ["..WWWW..", ".WWWWWW.", "WWWWWWWW", "WWdWWdWW", "WWWWWWWW", "WWWWWWWW", "WWWWWWWW", "W.WW.WW."] },
      { name: 'Flower',   rows: ["..P..P..", ".PPPPPP.", ".PPyyPP.", ".PPyyPP.", ".PPPPPP.", "...GG...", "..G.GG..", "...GG..."] },
      { name: 'Diamond',  rows: ["..cccc..", ".cCWCCc.", "cCCCCCCc", "cCCWCCCc", ".cCCCCc.", ".cCCCCc.", "..cCCc..", "...cc..."] },
      { name: 'Ruby',     rows: gem('R', 'r', 'W') },
      { name: 'Emerald',  rows: gem('g', 'G', 'W') },
      { name: 'Sapphire', rows: gem('b', 'B', 'C') },
      { name: 'Amethyst', rows: gem('p', 'u', 'W') },
      { name: 'Topaz',    rows: gem('y', 'o', 'Y') },
      { name: 'Life Crystal',  rows: ["........", ".rR..Rr.", "rRWRRWRr", "rRRRRRRr", ".rRRRRr.", "..rRRr..", "...rr...", "........"] },
      { name: 'Mana Star',     rows: star('b', 'C') },
      { name: 'Fallen Star',   rows: ["...y....", "..yyy...", ".yyyyy..", "yyYWYyy.", ".yyyyy..", "..yyy...", "...y....", "........"] },
      { name: 'Glow Shroom',   rows: ["..mmmm..", ".mmCmmm.", "mCmmmmCm", "mmmmmmmm", "..bbbb..", "..bccb..", "..bbbb..", "..bbbb.."] }
    ];

    function expand(rows) {
      const out = [];
      for (let y = 0; y < N; y++) {
        const r = rows[y] || '';
        for (let x = 0; x < N; x++) out.push(KEY[r[x]] || OFF);
      }
      return out;
    }

    function loadImage(m) {
      cells = m.slice();
      cellEls.forEach((c, i) => c.style.background = cells[i]);
      save(); drawPreview();
      setStatus('Loaded starter — edit it or hit Send to Board.');
    }

    function renderGallery() {
      const gal = document.getElementById('gallery');
      STARTERS.forEach(s => {
        const m = expand(s.rows);
        const cv = document.createElement('canvas');
        cv.width = cv.height = N;
        cv.style.width = '36px'; cv.style.height = '36px';
        cv.style.imageRendering = 'pixelated'; cv.style.borderRadius = '5px';
        cv.style.border = '2px solid #2a2a2a'; cv.style.background = '#0a0a0a';
        cv.style.cursor = 'pointer';
        cv.title = s.name;
        const cx = cv.getContext('2d');
        m.forEach((hex, i) => { cx.fillStyle = (hex === OFF) ? '#0a0a0a' : hex; cx.fillRect(i % N, (i / N) | 0, 1, 1); });
        cv.addEventListener('click', () => loadImage(m));
        gal.appendChild(cv);
      });
    }

    load();
    markSwatch();
    drawPreview();
    renderGallery();
  </script>
  <script src="backnav.js" data-auto data-parent="/" data-label="Home"></script>
  <script src="header.js" data-auto></script>
</body>
</html>
