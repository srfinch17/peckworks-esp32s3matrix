<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji — ESP32 Matrix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 16px; }
    .back:hover { color: #999; }
    h1 { font-size: 1.3rem; color: #ffcc00; margin-bottom: 4px; }
    .subtitle { color: #555; font-size: 0.82rem; margin-bottom: 20px; }
    .panel { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .panel-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-bottom: 16px; }
    .group { margin-bottom: 20px; }
    .group:last-child { margin-bottom: 0; }
    .group > label { display: block; font-size: 0.72rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 9px; }
    select {
      background: #1e1e1e; color: #e0e0e0; border: 1px solid #333;
      border-radius: 7px; padding: 10px 14px; font-size: 1.1rem;
      width: 100%; max-width: 360px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #ffcc00; }
    .layout { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; margin-top: 20px; }
    .col-label { font-size: 0.68rem; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; text-align: center; }
    .source-emoji { font-size: 4.5rem; line-height: 1; text-align: center; min-width: 80px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(8, 28px);
      grid-template-rows: repeat(8, 28px);
      gap: 2px;
    }
    .pixel { border-radius: 3px; background: #0a0a0a; }
    /* Brightness slider row */
    .bri-row { display: flex; align-items: center; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
    .bri-row label { font-size: 0.72rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
    .bri-row input[type=range] { flex: 1; min-width: 120px; max-width: 240px; accent-color: #ffcc00; cursor: pointer; }
    .bri-val { font-size: 0.85rem; color: #888; min-width: 28px; text-align: right; }
    .bri-hint { font-size: 0.68rem; color: #3a3a3a; margin-top: 6px; }
    .actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    button {
      background: #1e1e1e; color: #ccc; border: 1px solid #333;
      border-radius: 7px; padding: 9px 22px; cursor: pointer;
      font-size: 0.88rem; transition: background 0.12s;
    }
    button:hover { background: #272727; }
    button.send { border-color: #ffcc00; color: #ffcc00; }
    button.send:hover { background: #1a1600; }
    .status { font-size: 0.78rem; min-height: 1.2em; color: #00cc66; }
    .status.err { color: #ff5555; }
    canvas { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
  <a href="/" class="back">← Back</a>
  <h1>😊 Emoji</h1>
  <p class="subtitle">Pick an emoji — preview reflects exact board output at the current brightness</p>

  <div class="panel">
    <div class="panel-title">Select Emoji</div>

    <div class="group">
      <label for="emojiSelect">Emoji</label>
      <select id="emojiSelect" onchange="onEmojiChange()">
        <optgroup label="Faces">
          <option value="😀">😀  Grinning</option>

          <option value="💕">💕  Two Hearts</option>
          <option value="💥">💥  Explosion</option>
          <option value="⭐">⭐  Star</option>
          <option value="🌟">🌟  Glowing Star</option>
          <option value="✨">✨  Sparkles</option>

        </optgroup>
        <optgroup label="Animals">
          <option value="🐶">🐶  Dog</option>

          <option value="🐭">🐭  Mouse</option>

        </optgroup>
        <optgroup label="Food">
          <option value="🍎">🍎  Apple</option>
          <option value="🍊">🍊  Orange</option>
          <option value="🍋">🍋  Lemon</option>
          <option value="🍓">🍓  Strawberry</option>
          <option value="🍕">🍕  Pizza</option>
          <option value="🎂">🎂  Birthday Cake</option>
          <option value="🍦">🍦  Ice Cream</option>

        </optgroup>
        <optgroup label="Activities &amp; Objects">
          <option value="🎉">🎉  Party Popper</option>
          <option value="🎊">🎊  Confetti</option>
          <option value="🎁">🎁  Gift</option>
          <option value="🔥">🔥  Fire</option>
          <option value="🚀">🚀  Rocket</option>
          <option value="🎮">🎮  Game Controller</option>
          <option value="🎵">🎵  Music Note</option>
          <option value="🌈">🌈  Rainbow</option>
          <option value="☀️">☀️  Sun</option>
          <option value="🌙">🌙  Moon</option>
          <option value="❄️">❄️  Snowflake</option>
          <option value="⚡">⚡  Lightning</option>
          <option value="🏆">🏆  Trophy</option>
          <option value="💀">💀  Skull</option>
        </optgroup>
        <optgroup label="Gestures">
          <option value="👍">👍  Thumbs Up</option>
          <option value="👎">👎  Thumbs Down</option>
          <option value="👋">👋  Waving Hand</option>
          <option value="🤝">🤝  Handshake</option>
          <option value="🙌">🙌  Raising Hands</option>
          <option value="💪">💪  Flexed Bicep</option>
          <option value="🫶">🫶  Heart Hands</option>
          <option value="👏">👏  Clapping</option>
          <option value="🤞">🤞  Fingers Crossed</option>
        </optgroup>
      </select>
    </div>

    <div class="layout">
      <div>
        <div class="col-label">Source</div>
        <div class="source-emoji" id="sourceEmoji">😀</div>
      </div>
      <div>
        <div class="col-label">Board Preview</div>
        <div class="grid" id="pixelGrid"></div>
      </div>
    </div>

    <!-- Brightness — shared widget (bright.js). The preview tracks the global brightness. -->
    <div id="brightnessSlot"></div>
    <div class="bri-hint" id="bri-hint">Preview shows exact board output at the current brightness.</div>

    <!-- Vibrance: punch saturation so colors survive the shrink to 8×8 -->
    <div class="bri-row">
      <label>Vibrance — <span id="v-vib">60</span></label>
      <input type="range" id="vib-slider" min="0" max="100" value="60" oninput="onVibrance(this.value)">
      <span class="bri-val">color punch</span>
    </div>
    <div class="bri-hint">Higher = bolder, fewer colors (reads better at 8×8). Lower = truer to the original.</div>

    <div class="actions">
      <button class="send" onclick="sendToBoard()">Send to Board</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <canvas id="renderCanvas" width="192" height="192"></canvas>

  <script src="ledsim.js"></script>
  <script src="bright.js" data-auto></script>
  <script>
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    // Raw matrix from canvas — untouched pixel values from the emoji render
    let rawMatrix  = null;
    // Board matrix — normalized to full 0-255 range, sent to the board
    let boardMatrix = null;
    let vibrance    = 60;   // color punch %, 0 = raw averaged colors

    // ── Feature-preservation tunables (dialed in live against the preview) ──────────
    const FEATURE_RATIO    = 0.50;  // a source pixel is "ink" (a feature) if its luminance < fieldL * this
    const FEATURE_SNAP     = 0.30;  // a cell snaps to ink if at least this fraction of its pixels are ink
    const LOCAL_DARK_RATIO = 0.70;  // a cell is a "feature" if darker than this × its neighbour-mean luminance
    const FEATURE_DEEPEN   = 0.85;  // deepen a detected feature cell's value by this (crisper, no lift)

    // Brightness/visibility math comes from the shared ledsim.js
    // (LedSim.effective / LedSim.minVisibleChannel / LedSim.previewColor).

    // ── Color helpers ────────────────────────────────────────────────────────────
    function parseHex(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function toHex(r, g, b) {
      return '#' + [r,g,b].map(v => Math.min(255,Math.round(v)).toString(16).padStart(2,'0')).join('');
    }
    function luma(r, g, b) { return r * 0.299 + g * 0.587 + b * 0.114; }

    // Scale every pixel so the brightest channel in the whole image = 255.
    // This ensures the full dynamic range of the board is used regardless of
    // how dim the raw canvas render came out.
    // Black pixels (all channels 0) stay black.
    function normalizeMatrix(matrix) {
      let maxCh = 0;
      for (const row of matrix)
        for (const hex of row) {
          const [r,g,b] = parseHex(hex);
          maxCh = Math.max(maxCh, r, g, b);
        }
      if (maxCh === 0 || maxCh >= 255) return matrix;
      const scale = 255 / maxCh;
      return matrix.map(row => row.map(hex => {
        const [r,g,b] = parseHex(hex);
        if (r === 0 && g === 0 && b === 0) return '#000000';
        return toHex(r * scale, g * scale, b * scale);
      }));
    }

    // (LED appearance / gamma preview is provided by LedSim.previewColor — see ledsim.js)

    // ── Vibrance / color punch ─────────────────────────────────────────────────────
    // Averaging an emoji down to 8×8 muddies and desaturates colors, so they read
    // as gray-ish soup. Punch saturation (and lift dim cells) so each cell reads as
    // its dominant hue — "fewer, bolder colors," which survive the shrink far better.
    function rgb2hsv(r, g, b) {
      r/=255; g/=255; b/=255;
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
      let h=0;
      if (d) { if (mx===r) h=((g-b)/d)%6; else if (mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if (h<0) h+=360; }
      return [h, mx===0?0:d/mx, mx];
    }
    function hsv2rgb(h, s, v) {
      const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
      let r,g,b;
      if (h<60){r=c;g=x;b=0;} else if (h<120){r=x;g=c;b=0;} else if (h<180){r=0;g=c;b=x;}
      else if (h<240){r=0;g=x;b=c;} else if (h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
      return [(r+m)*255, (g+m)*255, (b+m)*255];
    }
    function punchColors(matrix, amount) {
      const k = amount / 100;                       // 0 = none, 1 = full punch
      // Per-cell luminance grid (black cells = 0) so we can judge local contrast.
      const L = matrix.map(row => row.map(hex => {
        const [r,g,b] = parseHex(hex);
        return luma(r, g, b);
      }));
      return matrix.map((row, y) => row.map((hex, x) => {
        const [r,g,b] = parseHex(hex);
        if (r===0 && g===0 && b===0) return '#000000';
        let [h,s,v] = rgb2hsv(r,g,b);
        // Ramp the saturation boost in by the ORIGINAL saturation: achromatic
        // cells (white/gray — s≈0, where hue is undefined/noise) must stay
        // achromatic, or every white pixel turns pink (hue defaults to red).
        s = Math.min(1, s + (1 - s) * k * Math.min(1, s / 0.15));

        // Local-contrast gate: if this cell is dark relative to its (non-black)
        // neighbours it's a feature (eye/mouth) — keep it dark (deepen, no lift).
        // Otherwise lift muddy/dark FILL cells a touch as before.
        let sum = 0, n = 0;
        for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
          if (!dy && !dx) continue;
          const ny=y+dy, nx=x+dx;
          if (ny<0||ny>7||nx<0||nx>7) continue;
          if (L[ny][nx] <= 0) continue;             // ignore black/empty neighbours
          sum += L[ny][nx]; n++;
        }
        const localMean = n ? sum / n : 0;
        if (n && L[y][x] < localMean * LOCAL_DARK_RATIO) v = v * FEATURE_DEEPEN;
        else v = Math.min(1, v + (1 - v) * k * 0.45);

        const [nr,ng,nb] = hsv2rgb(h,s,v);
        return toHex(nr,ng,nb);
      }));
    }

    // Re-run the color pipeline from the stored raw render (no re-render needed).
    function reprocess() {
      if (!rawMatrix) return;
      boardMatrix = punchColors(normalizeMatrix(rawMatrix), vibrance);
      updatePreview();
    }
    function onVibrance(val) {
      vibrance = +val;
      document.getElementById('v-vib').textContent = val;
      reprocess();
    }

    // ── Emoji render ─────────────────────────────────────────────────────────────
    // Renders onto a 192×192 canvas, then downsamples to 8×8 by classifying each source
    // pixel as dark "ink" (a feature: eye/mouth/outline) vs bright "field" and snapping
    // each cell to one or the other — so thin dark features survive instead of averaging
    // into brown mud. See docs/superpowers/specs/2026-06-15-emoji-feature-preservation-design.md.
    function renderEmoji(emoji) {
      const SIZE  = 192;
      const BLOCK = SIZE / 8;
      const MIN_OPAQUE = (BLOCK * BLOCK * 0.06) | 0;

      canvas.width  = SIZE;
      canvas.height = SIZE;
      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx.font = `${(SIZE * 0.82) | 0}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, SIZE / 2, SIZE / 2);

      const { data } = ctx.getImageData(0, 0, SIZE, SIZE);

      // Pass 1 — bright-field luminance = 75th percentile of opaque pixels. For a face
      // this is the yellow disc; for a solid emoji it's just that color.
      const lumas = [];
      for (let i = 0; i < data.length; i += 4)
        if (data[i + 3] > 50) lumas.push(luma(data[i], data[i+1], data[i+2]));
      if (!lumas.length) return Array.from({ length: 8 }, () => Array(8).fill('#000000'));
      lumas.sort((a, b) => a - b);
      const fieldL = lumas[Math.min(lumas.length - 1, Math.floor(lumas.length * 0.75))];
      const inkThreshold = fieldL * FEATURE_RATIO;

      // Pass 2 — per 8×8 cell, accumulate ink vs field pixels separately, then snap.
      const matrix = [];
      for (let by = 0; by < 8; by++) {
        const row = [];
        for (let bx = 0; bx < 8; bx++) {
          let iR=0,iG=0,iB=0,iN=0;   // ink (feature) accumulators
          let fR=0,fG=0,fB=0,fN=0;   // field accumulators
          for (let py = 0; py < BLOCK; py++) {
            for (let px = 0; px < BLOCK; px++) {
              const ix = bx * BLOCK + px;
              const iy = by * BLOCK + py;
              const i  = (iy * SIZE + ix) * 4;
              if (data[i + 3] <= 50) continue;
              const Lp = luma(data[i], data[i+1], data[i+2]);
              if (Lp < inkThreshold) { iR+=data[i]; iG+=data[i+1]; iB+=data[i+2]; iN++; }
              else                   { fR+=data[i]; fG+=data[i+1]; fB+=data[i+2]; fN++; }
            }
          }
          const opaque = iN + fN;
          if (opaque < MIN_OPAQUE)              row.push('#000000');
          else if (iN / opaque >= FEATURE_SNAP) row.push(toHex(iR/iN, iG/iN, iB/iN)); // snap to feature
          else if (fN)                          row.push(toHex(fR/fN, fG/fN, fB/fN)); // clean field
          else                                  row.push(toHex(iR/iN, iG/iN, iB/iN)); // all-ink cell
        }
        matrix.push(row);
      }
      return matrix;
    }

    // ── Preview ───────────────────────────────────────────────────────────────────
    function updatePreview() {
      if (!boardMatrix) return;
      const grid = document.getElementById('pixelGrid');
      grid.innerHTML = '';
      for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
          const px = document.createElement('div');
          px.className = 'pixel';
          px.style.background = LedSim.previewColor(boardMatrix[y][x], LedSim.bri());
          grid.appendChild(px);
        }
      }
    }

    // ── Brightness hint (driven by the shared bright.js widget) ─────────────────────
    function updateBriHint() {
      const bri = LedSim.bri();
      const mv  = LedSim.minVisibleChannel(bri);
      document.getElementById('bri-hint').textContent =
        `At brightness ${bri}: any channel below ${mv} is physically dark. ` +
        (mv <= 4 ? 'Full color detail visible.' : mv <= 15 ? 'Good detail.' : 'Raise brightness for better color range.');
    }
    // Re-render the preview + hint whenever the shared brightness changes.
    if (window.LedSim) LedSim.onChange(() => { updateBriHint(); updatePreview(); });

    // ── Emoji change ──────────────────────────────────────────────────────────────
    function onEmojiChange() {
      const emoji = document.getElementById('emojiSelect').value;
      document.getElementById('sourceEmoji').textContent = emoji;
      rawMatrix = renderEmoji(emoji);
      reprocess();   // normalize + vibrance punch + preview
    }

    // ── Send to board ─────────────────────────────────────────────────────────────
    async function sendToBoard() {
      if (!boardMatrix) return;
      setStatus('Sending…');
      try {
        // Brightness is handled globally by the shared bright.js widget — just send the matrix.
        const r = await fetch('/api/display/matrix', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ matrix: boardMatrix })
        });
        setStatus(r.ok ? 'Sent!' : 'Error — is the board reachable?', !r.ok);
      } catch {
        setStatus('Error — could not reach board.', true);
      }
    }

    function setStatus(msg, isErr = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    (function init() {
      updateBriHint();
      onEmojiChange();
    })();
  </script>
  </div>
  <script src="header.js" data-auto></script>
</body>
</html>
