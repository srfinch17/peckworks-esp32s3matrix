<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji — ESP32 Matrix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 16px; }
    .back:hover { color: #999; }
    h1 { font-size: 1.3rem; color: #ffcc00; margin-bottom: 4px; }
    .subtitle { color: #555; font-size: 0.82rem; margin-bottom: 20px; }
    .panel { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .panel-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-bottom: 16px; }
    .group { margin-bottom: 20px; }
    .group:last-child { margin-bottom: 0; }
    .group > label { display: block; font-size: 0.72rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 9px; }
    select {
      background: #1e1e1e; color: #e0e0e0; border: 1px solid #333;
      border-radius: 7px; padding: 10px 14px; font-size: 1.1rem;
      width: 100%; max-width: 360px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #ffcc00; }
    .layout { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; margin-top: 20px; }
    .col-label { font-size: 0.68rem; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; text-align: center; }
    .source-emoji { font-size: 4.5rem; line-height: 1; text-align: center; min-width: 80px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(8, 28px);
      grid-template-rows: repeat(8, 28px);
      gap: 2px;
    }
    .pixel { border-radius: 3px; background: #0a0a0a; }
    /* Brightness slider row */
    .bri-row { display: flex; align-items: center; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
    .bri-row label { font-size: 0.72rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
    .bri-row input[type=range] { flex: 1; min-width: 120px; max-width: 240px; accent-color: #ffcc00; cursor: pointer; }
    .bri-val { font-size: 0.85rem; color: #888; min-width: 28px; text-align: right; }
    .bri-hint { font-size: 0.68rem; color: #3a3a3a; margin-top: 6px; }
    .actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    button {
      background: #1e1e1e; color: #ccc; border: 1px solid #333;
      border-radius: 7px; padding: 9px 22px; cursor: pointer;
      font-size: 0.88rem; transition: background 0.12s;
    }
    button:hover { background: #272727; }
    button.send { border-color: #ffcc00; color: #ffcc00; }
    button.send:hover { background: #1a1600; }
    .status { font-size: 0.78rem; min-height: 1.2em; color: #00cc66; }
    .status.err { color: #ff5555; }
    canvas { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
  <a href="/" class="back">← Back</a>
  <h1>😊 Emoji</h1>
  <p class="subtitle">Pick an emoji — preview reflects exact board output at the current brightness</p>

  <div class="panel">
    <div class="panel-title">Select Emoji</div>

    <div class="group">
      <label for="emojiSelect">Emoji</label>
      <select id="emojiSelect" onchange="onEmojiChange()">
        <optgroup label="Faces">
          <option value="😀">😀  Grinning</option>
          <option value="😊">😊  Smiling</option>
          <option value="😍">😍  Heart Eyes</option>
          <option value="😂">😂  Tears of Joy</option>
          <option value="🥹">🥹  Holding Back Tears</option>
          <option value="😢">😢  Crying</option>
          <option value="😡">😡  Angry</option>
          <option value="🤔">🤔  Thinking</option>
          <option value="😎">😎  Cool</option>
          <option value="🤩">🤩  Star-Struck</option>
          <option value="😴">😴  Sleeping</option>
          <option value="🤗">🤗  Hugging</option>
          <option value="🥳">🥳  Partying</option>
          <option value="😱">😱  Shocked</option>
          <option value="🤯">🤯  Mind Blown</option>
          <option value="🤑">🤑  Money-Mouth</option>
        </optgroup>
        <optgroup label="Hearts &amp; Symbols">
          <option value="❤️">❤️  Red Heart</option>
          <option value="🧡">🧡  Orange Heart</option>
          <option value="💛">💛  Yellow Heart</option>
          <option value="💚">💚  Green Heart</option>
          <option value="💙">💙  Blue Heart</option>
          <option value="💜">💜  Purple Heart</option>
          <option value="🖤">🖤  Black Heart</option>
          <option value="💕">💕  Two Hearts</option>
          <option value="💥">💥  Explosion</option>
          <option value="⭐">⭐  Star</option>
          <option value="🌟">🌟  Glowing Star</option>
          <option value="✨">✨  Sparkles</option>
          <option value="💎">💎  Diamond</option>
        </optgroup>
        <optgroup label="Animals">
          <option value="🐶">🐶  Dog</option>
          <option value="🐱">🐱  Cat</option>
          <option value="🐭">🐭  Mouse</option>
          <option value="🐸">🐸  Frog</option>
          <option value="🐧">🐧  Penguin</option>
          <option value="🦁">🦁  Lion</option>
          <option value="🦊">🦊  Fox</option>
          <option value="🐻">🐻  Bear</option>
          <option value="🐼">🐼  Panda</option>
          <option value="🦋">🦋  Butterfly</option>
          <option value="🦄">🦄  Unicorn</option>
        </optgroup>
        <optgroup label="Food">
          <option value="🍎">🍎  Apple</option>
          <option value="🍊">🍊  Orange</option>
          <option value="🍋">🍋  Lemon</option>
          <option value="🍓">🍓  Strawberry</option>
          <option value="🍕">🍕  Pizza</option>
          <option value="🎂">🎂  Birthday Cake</option>
          <option value="🍦">🍦  Ice Cream</option>
          <option value="🍩">🍩  Donut</option>
          <option value="🍺">🍺  Beer</option>
          <option value="☕">☕  Coffee</option>
        </optgroup>
        <optgroup label="Activities &amp; Objects">
          <option value="🎉">🎉  Party Popper</option>
          <option value="🎊">🎊  Confetti</option>
          <option value="🎁">🎁  Gift</option>
          <option value="🔥">🔥  Fire</option>
          <option value="🚀">🚀  Rocket</option>
          <option value="🎮">🎮  Game Controller</option>
          <option value="🎵">🎵  Music Note</option>
          <option value="🌈">🌈  Rainbow</option>
          <option value="☀️">☀️  Sun</option>
          <option value="🌙">🌙  Moon</option>
          <option value="❄️">❄️  Snowflake</option>
          <option value="⚡">⚡  Lightning</option>
          <option value="🏆">🏆  Trophy</option>
          <option value="💀">💀  Skull</option>
        </optgroup>
        <optgroup label="Gestures">
          <option value="👍">👍  Thumbs Up</option>
          <option value="👎">👎  Thumbs Down</option>
          <option value="👋">👋  Waving Hand</option>
          <option value="🤝">🤝  Handshake</option>
          <option value="🙌">🙌  Raising Hands</option>
          <option value="💪">💪  Flexed Bicep</option>
          <option value="🫶">🫶  Heart Hands</option>
          <option value="👏">👏  Clapping</option>
          <option value="🤞">🤞  Fingers Crossed</option>
        </optgroup>
      </select>
    </div>

    <div class="layout">
      <div>
        <div class="col-label">Source</div>
        <div class="source-emoji" id="sourceEmoji">😀</div>
      </div>
      <div>
        <div class="col-label">Board Preview</div>
        <div class="grid" id="pixelGrid"></div>
      </div>
    </div>

    <!-- Brightness slider -->
    <div class="bri-row">
      <label>Brightness — <span id="v-bri">80</span></label>
      <input type="range" id="bri-slider" min="0" max="255" value="80" oninput="onBriSlider(this.value)">
      <span class="bri-val" id="bri-minvis">min R/G/B: 4</span>
    </div>
    <div class="bri-hint" id="bri-hint">Preview shows exact board output at this brightness. Higher brightness = more visible color detail.</div>

    <div class="actions">
      <button class="send" onclick="sendToBoard()">Send to Board</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <canvas id="renderCanvas" width="192" height="192"></canvas>

  <script>
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    // Raw matrix from canvas — untouched pixel values from the emoji render
    let rawMatrix  = null;
    // Board matrix — normalized to full 0-255 range, sent to the board
    let boardMatrix = null;
    let currentBri  = 80;

    // ── Brightness formula (matches FastLED nscale8x3 exactly) ──────────────────
    // LED is ON when result >= 1, OFF when result == 0.
    function effective(channel, bri) { return (channel * (bri + 1) / 256) | 0; }
    function minVisible(bri)         { return Math.ceil(256 / (bri + 1)); }

    // ── Color helpers ────────────────────────────────────────────────────────────
    function parseHex(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function toHex(r, g, b) {
      return '#' + [r,g,b].map(v => Math.min(255,Math.round(v)).toString(16).padStart(2,'0')).join('');
    }

    // Scale every pixel so the brightest channel in the whole image = 255.
    // This ensures the full dynamic range of the board is used regardless of
    // how dim the raw canvas render came out.
    // Black pixels (all channels 0) stay black.
    function normalizeMatrix(matrix) {
      let maxCh = 0;
      for (const row of matrix)
        for (const hex of row) {
          const [r,g,b] = parseHex(hex);
          maxCh = Math.max(maxCh, r, g, b);
        }
      if (maxCh === 0 || maxCh >= 255) return matrix;
      const scale = 255 / maxCh;
      return matrix.map(row => row.map(hex => {
        const [r,g,b] = parseHex(hex);
        if (r === 0 && g === 0 && b === 0) return '#000000';
        return toHex(r * scale, g * scale, b * scale);
      }));
    }

    // LED pixels are linear; screens use gamma ~2.2 — direct rgb() of effective values looks too dark.
    function ledToDisplay(v) { return v === 0 ? 0 : Math.round(255 * Math.pow(v / 255, 1 / 2.2)); }
    // Return the CSS color the board will actually display for a given hex + brightness.
    function previewColor(hex, bri) {
      const [r,g,b] = parseHex(hex);
      return `rgb(${ledToDisplay(effective(r,bri))},${ledToDisplay(effective(g,bri))},${ledToDisplay(effective(b,bri))})`;
    }

    // ── Emoji render ─────────────────────────────────────────────────────────────
    // Renders onto a 192×192 canvas then downsamples to 8×8 using inverse-luminance
    // weighting so dark features (eyes, outlines) aren't washed out by bright areas.
    function renderEmoji(emoji) {
      const SIZE  = 192;
      const BLOCK = SIZE / 8;
      const MIN_OPAQUE = (BLOCK * BLOCK * 0.06) | 0;

      canvas.width  = SIZE;
      canvas.height = SIZE;
      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx.font = `${(SIZE * 0.82) | 0}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, SIZE / 2, SIZE / 2);

      const { data } = ctx.getImageData(0, 0, SIZE, SIZE);
      const matrix = [];

      for (let by = 0; by < 8; by++) {
        const row = [];
        for (let bx = 0; bx < 8; bx++) {
          let r = 0, g = 0, b = 0, totalW = 0, count = 0;
          for (let py = 0; py < BLOCK; py++) {
            for (let px = 0; px < BLOCK; px++) {
              const ix = bx * BLOCK + px;
              const iy = by * BLOCK + py;
              const i  = (iy * SIZE + ix) * 4;
              if (data[i + 3] > 50) {
                const pL = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                const w  = Math.pow((255 - pL + 20) / 275, 2);
                r += data[i]   * w;
                g += data[i+1] * w;
                b += data[i+2] * w;
                totalW += w;
                count++;
              }
            }
          }
          row.push(count < MIN_OPAQUE ? '#000000' : toHex(r / totalW, g / totalW, b / totalW));
        }
        matrix.push(row);
      }
      return matrix;
    }

    // ── Preview ───────────────────────────────────────────────────────────────────
    function updatePreview() {
      if (!boardMatrix) return;
      const grid = document.getElementById('pixelGrid');
      grid.innerHTML = '';
      for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
          const px = document.createElement('div');
          px.className = 'pixel';
          px.style.background = previewColor(boardMatrix[y][x], currentBri);
          grid.appendChild(px);
        }
      }
    }

    // ── Brightness slider ─────────────────────────────────────────────────────────
    let briTimer;
    function onBriSlider(val) {
      currentBri = +val;
      document.getElementById('v-bri').textContent = val;
      const mv = minVisible(currentBri);
      document.getElementById('bri-minvis').textContent = `min R/G/B: ${mv}`;
      document.getElementById('bri-hint').textContent =
        `At brightness ${val}: any channel below ${mv} is physically dark. ` +
        (mv <= 4 ? 'Full color detail visible.' : mv <= 15 ? 'Good detail.' : 'Raise brightness for better color range.');
      localStorage.setItem('emoji_brightness', String(val));
      updatePreview();
      clearTimeout(briTimer);
      briTimer = setTimeout(async () => {
        try {
          await fetch('/api/brightness', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ level: currentBri })
          });
        } catch {}
      }, 200);
    }

    // ── Emoji change ──────────────────────────────────────────────────────────────
    function onEmojiChange() {
      const emoji = document.getElementById('emojiSelect').value;
      document.getElementById('sourceEmoji').textContent = emoji;
      rawMatrix   = renderEmoji(emoji);
      boardMatrix = normalizeMatrix(rawMatrix);
      updatePreview();
    }

    // ── Send to board ─────────────────────────────────────────────────────────────
    async function sendToBoard() {
      if (!boardMatrix) return;
      setStatus('Sending…');
      try {
        // Set brightness first, then send the matrix
        await fetch('/api/brightness', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: currentBri })
        });
        const r = await fetch('/api/display/matrix', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ matrix: boardMatrix })
        });
        setStatus(r.ok ? 'Sent!' : 'Error — is the board reachable?', !r.ok);
      } catch {
        setStatus('Error — could not reach board.', true);
      }
    }

    function setStatus(msg, isErr = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    (function init() {
      const saved = localStorage.getItem('emoji_brightness');
      if (saved !== null) {
        currentBri = +saved;
        document.getElementById('bri-slider').value = currentBri;
        document.getElementById('v-bri').textContent = currentBri;
        const mv = minVisible(currentBri);
        document.getElementById('bri-minvis').textContent = `min R/G/B: ${mv}`;
      }
      onEmojiChange();
    })();
  </script>
  </div>
</body>
</html>
