<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Scroller</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#00ff88">
  <h1>✏️ Text Scroller</h1>

  <div class="panel">
    <div class="subcard">
      <div class="subhead">Message</div>
      <div class="row">
        <input type="text" id="text-input" placeholder="HELLO WORLD" maxlength="40" oninput="updatePreview()"
               style="width:100%;background:#0d0d0d;border:1px solid #2e2e2e;border-radius:7px;color:#eee;padding:10px 12px;font-size:1rem;font-family:monospace;outline:none">
      </div>
      <div class="hint" id="preview"></div>
    </div>

    <div class="subcard">
      <div class="subhead">Letter Size</div>
      <div class="chips">
        <button class="chip active" id="btn-normal" onclick="setSize('normal')">Normal</button>
        <button class="chip"        id="btn-small"  onclick="setSize('small')">Small</button>
        <button class="chip"        id="btn-tiny"   onclick="setSize('tiny')">Tiny</button>
      </div>
    </div>

    <div class="subcard">
      <div class="subhead">Color Mode</div>
      <div class="chips">
        <button class="chip active" id="btn-solid"    onclick="setMode('solid')">Solid</button>
        <button class="chip"        id="btn-gradient" onclick="setMode('gradient')">Gradient</button>
      </div>

      <div id="gradient-options" style="display:none;margin-top:12px">
        <label>Palette — <span id="tx-pal-num">—</span> · <span id="tx-pal-name">Custom</span></label>
        <div class="df-pal-grid" id="tx-pal-grid"></div>
      </div>

      <div class="color-row" style="margin-top:12px">
        <div class="picker-group" id="block1">
          <label id="label1">Color</label>
          <div class="row" style="margin-bottom:0">
            <input type="color" id="color1" value="#ffffff" oninput="syncHex('color1','hex1'); clearTxPreset(); if(live) liveApply()">
            <span class="hint" id="hex1" style="margin-top:0">#FFFFFF</span>
          </div>
        </div>
        <div class="picker-group" id="block2" style="opacity:.35;pointer-events:none">
          <label>Color 2</label>
          <div class="row" style="margin-bottom:0">
            <input type="color" id="color2" value="#ff4400" oninput="syncHex('color2','hex2'); clearTxPreset(); if(live) liveApply()">
            <span class="hint" id="hex2" style="margin-top:0">#FF4400</span>
          </div>
        </div>
        <div class="picker-group" id="block3" style="opacity:.35;pointer-events:none">
          <label>Color 3</label>
          <div class="row" style="margin-bottom:0">
            <input type="color" id="color3" value="#00cc64" oninput="syncHex('color3','hex3'); clearTxPreset(); if(live) liveApply()">
            <span class="hint" id="hex3" style="margin-top:0">#00CC64</span>
          </div>
        </div>
        <div class="picker-group" id="block4" style="opacity:.35;pointer-events:none">
          <label>Color 4</label>
          <div class="row" style="margin-bottom:0">
            <input type="color" id="color4" value="#0064ff" oninput="syncHex('color4','hex4'); clearTxPreset(); if(live) liveApply()">
            <span class="hint" id="hex4" style="margin-top:0">#0064FF</span>
          </div>
        </div>
      </div>
    </div>

    <div class="subcard">
      <div class="subhead">Scroll Speed</div>
      <div class="row"><label>Speed — <span id="v-speed">100</span>ms per step</label></div>
      <div class="row">
        <input type="range" id="speed" min="30" max="300" value="100"
               oninput="document.getElementById('v-speed').textContent=this.value; if(live) liveApply()">
      </div>
      <div class="hint">Lower = faster. Scrolls continuously with a 1-second pause between loops.</div>
    </div>

    <div class="actions">
      <button class="btn-primary"   onclick="sendText()">Send to Display</button>
      <button class="btn-secondary" onclick="clearDisplay()">Clear</button>
      <span class="live-dot">applies live</span>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    let gradientMode = false;
    let sizeMode     = 'normal';
    let live      = true;   // live-apply appearance/params (NOT the message text)
    let liveTimer = null;
    function liveApply() {
      clearTimeout(liveTimer);
      liveTimer = setTimeout(sendTextLive, 180);
    }
    // Live-apply variant: re-push only when there's already text (don't error on empty).
    function sendTextLive() {
      if (!document.getElementById('text-input').value.trim()) return;
      sendText();
    }

    function setSize(size) {
      sizeMode = size;
      document.getElementById('btn-normal').classList.toggle('active', size === 'normal');
      document.getElementById('btn-small').classList.toggle('active',  size === 'small');
      document.getElementById('btn-tiny').classList.toggle('active',   size === 'tiny');
      if (live) liveApply();
    }

    function setMode(mode) {
      gradientMode = (mode === 'gradient');
      document.getElementById('btn-solid').classList.toggle('active', !gradientMode);
      document.getElementById('btn-gradient').classList.toggle('active', gradientMode);
      ['block2','block3','block4'].forEach(id => {
        const el = document.getElementById(id);
        el.style.opacity = gradientMode ? '' : '.35';
        el.style.pointerEvents = gradientMode ? '' : 'none';
      });
      document.getElementById('gradient-options').style.display = gradientMode ? '' : 'none';
      document.getElementById('label1').textContent = gradientMode ? 'Color 1' : 'Color';
      if (live) liveApply();
    }

    function syncHex(inputId, hexId) {
      document.getElementById(hexId).textContent =
        document.getElementById(inputId).value.toUpperCase();
    }

    function updatePreview() {
      const t = document.getElementById('text-input').value.toUpperCase();
      document.getElementById('preview').textContent = t ? 'Will scroll: ' + t : '';
    }

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function sendText() {
      const text   = document.getElementById('text-input').value.trim();
      const color  = document.getElementById('color1').value;
      const color2 = document.getElementById('color2').value;
      const color3 = document.getElementById('color3').value;
      const color4 = document.getElementById('color4').value;
      const speed  = +document.getElementById('speed').value;

      if (!text) { setStatus('Enter some text first.', true); return; }

      try {
        const r = await fetch('/api/display/text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, color, color2, color3, color4, gradient: gradientMode, small: sizeMode === 'small', tiny: sizeMode === 'tiny', scroll_speed: speed })
        });
        setStatus(r.ok ? '✓ Scrolling: ' + text.toUpperCase() : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function clearDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    // ── Palette ───────────────────────────────────────────────────────────────────
    const DF_PAL = [
      ['Neon Classic',  '#ff00ff','#00ffff','#ffff00','#00ff00'],
      ['Neon Shifted',  '#ff0080','#00ff80','#8000ff','#ff8000'],
      ['Neon Soft',     '#ff00c8','#00c8ff','#c8ff00','#ffc800'],
      ['Primary Neon',  '#ff0050','#5000ff','#00ff50','#ff5000'],
      ['Electric',      '#dc00ff','#00ffdc','#ffdc00','#00dcff'],
      ['Pink Purple',   '#ff00ff','#ff0064','#6400ff','#0064ff'],
      ['Cyan Family',   '#00ffff','#00c8ff','#00ffc8','#0096ff'],
      ['Yellow Family', '#ffff00','#ffc800','#c8ff00','#ff9600'],
      ['Fire',          '#ff3200','#ff9600','#ffc800','#ffff32'],
      ['Red Hot',       '#ff0000','#ff5000','#c80000','#ff2828'],
      ['Amber',         '#ff6400','#ffc832','#ff3200','#c86400'],
      ['Ember',         '#ff1400','#ff6400','#ffa000','#ffff64'],
      ['Lava',          '#ff0032','#ff3200','#c80064','#ff6432'],
      ['Sunset Warm',   '#ff5050','#ff2800','#c81400','#ffa050'],
      ['Gold',          '#ffc800','#ff6400','#ff3232','#c8c800'],
      ['Hot Candy',     '#ff0050','#ff5000','#ffb400','#c80050'],
      ['Ocean',         '#0064ff','#00c8ff','#00ffc8','#3232c8'],
      ['Aqua',          '#0096ff','#00ffff','#00c8c8','#64c8ff'],
      ['Deep Blue',     '#0032c8','#3264ff','#00c8ff','#6432c8'],
      ['Teal',          '#00c8c8','#0096c8','#32c8ff','#006496'],
      ['Blue Purple',   '#6400ff','#0064ff','#00c8ff','#3200c8'],
      ['Ice',           '#00ffff','#00c8ff','#0096ff','#0064c8'],
      ['Violet',        '#3200c8','#6400ff','#9632ff','#c864ff'],
      ['Navy',          '#0064c8','#003296','#3296ff','#64c8ff'],
      ['Forest',        '#00c800','#32ff32','#64ff00','#009632'],
      ['Lime',          '#00ff00','#64ff00','#00c832','#32ff64'],
      ['Chartreuse',    '#64ff00','#c8ff00','#32c800','#96ff32'],
      ['Emerald',       '#009632','#00c864','#32ff96','#006432'],
      ['Earth',         '#c89632','#966400','#64c832','#c8c864'],
      ['Autumn',        '#ff9600','#c86400','#64c800','#ffc832'],
      ['Spring',        '#ff6496','#c8ff64','#64c8ff','#ffc864'],
      ['Jade',          '#00c896','#009664','#32ffc8','#64ffc8'],
      ['Pastel Rainbow','#ff96c8','#96c8ff','#c8ff96','#ffff96'],
      ['Pastel Pink',   '#ff96c8','#ff6496','#c864c8','#ffc8dc'],
      ['Pastel Blue',   '#96c8ff','#6496ff','#9696ff','#c8dcff'],
      ['Pastel Green',  '#c8ffc8','#96ff96','#64dc96','#c8ffb4'],
      ['Pastel Warm',   '#ffc896','#ffdc96','#c89664','#ffe6b4'],
      ['Pastel Purple', '#c896ff','#dcb4ff','#b464ff','#f0c8ff'],
      ['Pastel Mint',   '#96fff0','#96dcff','#b4ffdc','#c8ffff'],
      ['Pastel Yellow', '#ffff96','#fff064','#ffc864','#ffffc8'],
      ['Red Mono',      '#ff0000','#c80000','#960000','#640000'],
      ['Orange Mono',   '#ff5000','#c83c00','#962800','#ff7800'],
      ['Yellow Mono',   '#ffff00','#c8c800','#969600','#ffdc32'],
      ['Green Mono',    '#00ff00','#00c800','#009600','#32ff32'],
      ['Blue Mono',     '#0000ff','#0000c8','#0032ff','#3232ff'],
      ['Purple Mono',   '#9600ff','#6400c8','#c832ff','#5000b4'],
      ['Pink Mono',     '#ff0096','#c80064','#ff32b4','#960050'],
      ['Teal Mono',     '#00ffc8','#00c896','#32ffdc','#009678'],
      ['80s Classic',   '#ff00ff','#00ff00','#ffff00','#0000ff'],
      ['Miami Vice',    '#ff0064','#00c8ff','#c8ff00','#ff6400'],
      ['Synthwave',     '#6400ff','#ff00ff','#00c8c8','#ffc800'],
      ['VHS',           '#ff3296','#9600ff','#00c8ff','#ffc832'],
      ['Arcade',        '#00ff00','#00c800','#ff0000','#0000ff'],
      ['Pac-Man',       '#ffc800','#ff6400','#00c800','#c800c8'],
      ['Pinball',       '#ffff00','#ff0000','#0000ff','#ffffff'],
      ['Funky',         '#00ff96','#ff0064','#ff9600','#6400ff'],
      ['Dark Galaxy',   '#640096','#003296','#960064','#006464'],
      ['Ember Dark',    '#500000','#320032','#000050','#502800'],
      ['Noir',          '#960032','#640064','#320096','#003264'],
      ['Deep Forest',   '#006400','#005032','#326400','#003c3c'],
      ['Rust',          '#643200','#500000','#323200','#3c1e00'],
      ['Abyss',         '#005064','#003250','#320064','#006450'],
      ['Dusk',          '#500050','#3c003c','#640032','#320050'],
      ['Grayscale',     '#323232','#505050','#787878','#1e1e1e'],
    ];

    let txPalIdx = null;
    const txPalGrid = document.getElementById('tx-pal-grid');
    DF_PAL.forEach(([name,c1,c2,c3,c4],i) => {
      const el = document.createElement('div');
      el.className = 'df-swatch';
      el.title = `${i}: ${name}`;
      el.style.background = `linear-gradient(to right,${c1} 25%,${c2} 25% 50%,${c3} 50% 75%,${c4} 75%)`;
      el.onclick = () => {
        txPalGrid.querySelectorAll('.df-swatch').forEach((s,j)=>s.classList.toggle('active',j===i));
        txPalIdx=i;
        document.getElementById('tx-pal-num').textContent=i;
        document.getElementById('tx-pal-name').textContent=name;
        document.getElementById('color1').value=c1; syncHex('color1','hex1');
        document.getElementById('color2').value=c2; syncHex('color2','hex2');
        document.getElementById('color3').value=c3; syncHex('color3','hex3');
        document.getElementById('color4').value=c4; syncHex('color4','hex4');
        if (live) liveApply();
      };
      txPalGrid.appendChild(el);
    });
    function clearTxPreset() {
      txPalGrid.querySelectorAll('.df-swatch').forEach(el=>el.classList.remove('active'));
      document.getElementById('tx-pal-num').textContent='—';
      document.getElementById('tx-pal-name').textContent='Custom';
      txPalIdx=null;
    }
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/" data-label="Home"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
