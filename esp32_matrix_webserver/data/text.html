<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Scroller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 16px; }
    .back:hover { color: #999; }
    h1 { font-size: 1.3rem; color: #4499ff; margin-bottom: 24px; }
    .panel { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; max-width: 480px; }
    .group { margin-bottom: 20px; }
    .group > label { display: block; font-size: 0.75rem; color: #777; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    input[type=text] { width: 100%; background: #0d0d0d; border: 1px solid #2e2e2e; border-radius: 7px; color: #eee; padding: 10px 12px; font-size: 1rem; font-family: monospace; outline: none; }
    input[type=text]:focus { border-color: #4499ff; }
    input[type=text]::placeholder { color: #3a3a3a; }

    /* Mode toggle */
    .mode-row { display: flex; gap: 8px; }
    .mode-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 7px; color: #888; padding: 8px 0; cursor: pointer; font-size: 0.85rem; text-align: center; transition: all 0.12s; user-select: none; }
    .mode-btn.active { background: #0d2a55; border-color: #1a4080; color: #88bbff; }

    /* Two color pickers side by side */
    .color-pair { display: flex; gap: 16px; }
    .color-block { flex: 1; }
    .color-block label { display: block; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .color-block.dim { opacity: 0.35; pointer-events: none; }
    .color-row { display: flex; align-items: center; gap: 10px; }
    input[type=color] { width: 48px; height: 36px; border: 1px solid #333; border-radius: 6px; background: none; cursor: pointer; padding: 2px; }
    .color-hex { font-size: 0.82rem; color: #777; font-family: monospace; }

    .slider-row { display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: #4499ff; cursor: pointer; }
    .hint { font-size: 0.7rem; color: #555; margin-top: 5px; }
    .preview { font-family: monospace; font-size: 0.82rem; color: #4466aa; margin-top: 6px; min-height: 1.2em; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary { background: #0d2a55; color: #88bbff; border: 1px solid #1a4080; border-radius: 7px; padding: 10px 22px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.12s; }
    .btn-primary:hover { background: #122f60; }
    .btn-secondary { background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 7px; padding: 10px 18px; cursor: pointer; font-size: 0.85rem; }
    .btn-secondary:hover { background: #222; }
    .status { font-size: 0.78rem; margin-top: 14px; min-height: 1.2em; color: #00cc66; }
    .status.err { color: #ff5555; }
  </style>
</head>
<body>
  <div class="wrap">
  <a href="/" class="back">← Home</a>
  <h1>✏️ Text Scroller</h1>

  <div class="panel">
    <div class="group">
      <label>Message</label>
      <input type="text" id="text-input" placeholder="HELLO WORLD" maxlength="40" oninput="updatePreview()">
      <div class="preview" id="preview"></div>
    </div>

    <div class="group">
      <label>Letter Size</label>
      <div class="mode-row">
        <div class="mode-btn active" id="btn-normal" onclick="setSize('normal')">Normal</div>
        <div class="mode-btn"        id="btn-small"  onclick="setSize('small')">Small</div>
        <div class="mode-btn"        id="btn-tiny"   onclick="setSize('tiny')">Tiny</div>
      </div>
    </div>

    <div class="group">
      <label>Color Mode</label>
      <div class="mode-row">
        <div class="mode-btn active" id="btn-solid"    onclick="setMode('solid')">Solid</div>
        <div class="mode-btn"        id="btn-gradient" onclick="setMode('gradient')">Gradient</div>
      </div>
    </div>

    <div class="group">
      <div class="color-pair">
        <div class="color-block" id="block1">
          <label id="label1">Color</label>
          <div class="color-row">
            <input type="color" id="color1" value="#ffffff" oninput="syncHex('color1','hex1')">
            <span class="color-hex" id="hex1">#FFFFFF</span>
          </div>
        </div>
        <div class="color-block dim" id="block2">
          <label>End Color</label>
          <div class="color-row">
            <input type="color" id="color2" value="#ff4400" oninput="syncHex('color2','hex2')">
            <span class="color-hex" id="hex2">#FF4400</span>
          </div>
        </div>
      </div>
    </div>

    <div class="group">
      <label>Scroll Speed — <span id="v-speed">100</span>ms per step</label>
      <div class="slider-row">
        <input type="range" id="speed" min="30" max="300" value="100" oninput="document.getElementById('v-speed').textContent=this.value">
      </div>
      <div class="hint">Lower = faster. Scrolls continuously with a 1-second pause between loops.</div>
    </div>

    <div class="actions">
      <button class="btn-primary"   onclick="sendText()">Send to Display</button>
      <button class="btn-secondary" onclick="clearDisplay()">Clear</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    let gradientMode = false;
    let sizeMode     = 'normal';

    function setSize(size) {
      sizeMode = size;
      document.getElementById('btn-normal').classList.toggle('active', size === 'normal');
      document.getElementById('btn-small').classList.toggle('active',  size === 'small');
      document.getElementById('btn-tiny').classList.toggle('active',   size === 'tiny');
    }

    function setMode(mode) {
      gradientMode = (mode === 'gradient');
      document.getElementById('btn-solid').classList.toggle('active', !gradientMode);
      document.getElementById('btn-gradient').classList.toggle('active', gradientMode);
      document.getElementById('block2').classList.toggle('dim', !gradientMode);
      document.getElementById('label1').textContent = gradientMode ? 'Start Color' : 'Color';
    }

    function syncHex(inputId, hexId) {
      document.getElementById(hexId).textContent =
        document.getElementById(inputId).value.toUpperCase();
    }

    function updatePreview() {
      const t = document.getElementById('text-input').value.toUpperCase();
      document.getElementById('preview').textContent = t ? 'Will scroll: ' + t : '';
    }

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function sendText() {
      const text  = document.getElementById('text-input').value.trim();
      const color  = document.getElementById('color1').value;
      const color2 = document.getElementById('color2').value;
      const speed  = +document.getElementById('speed').value;

      if (!text) { setStatus('Enter some text first.', true); return; }

      try {
        const r = await fetch('/api/display/text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, color, color2, gradient: gradientMode, small: sizeMode === 'small', tiny: sizeMode === 'tiny', scroll_speed: speed })
        });
        setStatus(r.ok ? '✓ Scrolling: ' + text.toUpperCase() : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function clearDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }
  </script>
  </div>
</body>
</html>
