<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Rain</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#00cc44">
  <h1>🖥️ Matrix Rain</h1>

  <div class="panel">
    <div class="layout">
      <div class="preview-frame">
        <canvas id="preview" class="preview" width="288" height="288"></canvas>
        <div class="preview-label">Live preview</div>
      </div>

      <div class="controls">
        <div class="subcard">
          <div class="subhead">Theme</div>
          <div class="chips">
            <button class="chip active" data-theme="classic">Classic</button>
            <button class="chip"        data-theme="blue">Blue</button>
            <button class="chip"        data-theme="red">Red</button>
            <button class="chip"        data-theme="purple">Purple</button>
          </div>
        </div>

        <div class="subcard">
          <div class="subhead">Motion</div>
          <div class="row"><label>Speed — <span id="v-speed">12</span> fps</label></div>
          <div class="row">
            <span style="font-size:.68rem;color:#555">Slow</span>
            <input type="range" id="speed" min="5" max="33" value="12">
            <span style="font-size:.68rem;color:#555">Fast</span>
          </div>
          <div class="hint">Higher fps = drops fall faster overall. Individual drops also vary randomly.</div>
        </div>

        <div class="subcard">
          <div class="subhead">Brightness</div>
          <div id="brightnessSlot"></div>
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="applyToDisplay()">Apply to Display</button>
          <button class="btn-secondary" onclick="stopDisplay()">Stop / Clear</button>
          <span class="live-dot">applies live</span>
        </div>

        <div class="status" id="status"></div>
      </div>
    </div>
  </div>

  <script src="ledsim.js"></script>
  <script>
    const W = 8, H = 8, CELL = 36, TRAIL_LEN = 4;

    const THEMES = {
      classic: { trail: [0, 180, 20],   head: [255, 255, 255] },
      blue:    { trail: [0, 80, 220],   head: [180, 220, 255] },
      red:     { trail: [220, 20, 0],   head: [255, 200, 180] },
      purple:  { trail: [160, 0, 220],  head: [230, 200, 255] }
    };

    let theme      = 'classic';
    let speedMs    = Math.round(1000 / 12);
    let live       = true;
    let liveTimer  = null;
    function liveApply() {
      clearTimeout(liveTimer);
      liveTimer = setTimeout(applyToDisplay, 180);
    }

    // Dim the preview to the shared brightness (bright.js widget) via the shared model.
    function dim(v) { return window.LedSim ? LedSim.effective(v, LedSim.bri()) : v; }

    // One drop per column, matching the firmware MatrixDrop struct exactly
    const drops = Array.from({ length: W }, (_, col) => ({
      col,
      headY: -Math.floor(Math.random() * H + 1),
      tick:  0,
      speed: Math.floor(Math.random() * 3) + 1   // 1–3 ticks per step
    }));

    function stepDrops() {
      for (const d of drops) {
        d.tick++;
        if (d.tick >= d.speed) {
          d.tick = 0;
          d.headY++;
        }
        if (d.headY > H + TRAIL_LEN) {
          d.headY = -Math.floor(Math.random() * H + 1);
          d.speed = Math.floor(Math.random() * 3) + 1;
        }
      }
    }

    const canvas = document.getElementById('preview');
    const ctx    = canvas.getContext('2d');

    function renderDrops() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W * CELL, H * CELL);

      const t = THEMES[theme];

      for (const d of drops) {
        // Head at full brightness — board brightness only affects the LEDs, not this canvas
        if (d.headY >= 0 && d.headY < H) {
          ctx.fillStyle = `rgb(${t.head[0]},${t.head[1]},${t.head[2]})`;
          ctx.fillRect(d.col * CELL, d.headY * CELL, CELL, CELL);
        }

        // Fading trail
        for (let i = 1; i <= TRAIL_LEN; i++) {
          const ty = d.headY - i;
          if (ty < 0 || ty >= H) continue;
          const fade = 1 - i / (TRAIL_LEN + 1);
          ctx.fillStyle = `rgb(${(t.trail[0] * fade) | 0},${(t.trail[1] * fade) | 0},${(t.trail[2] * fade) | 0})`;
          ctx.fillRect(d.col * CELL, ty * CELL, CELL, CELL);
        }
      }
    }

    let lastStep = 0;
    function animate(ts) {
      if (ts - lastStep >= speedMs) {
        lastStep = ts;
        stepDrops();
        renderDrops();
      }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── UI wiring ─────────────────────────────────────────────

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    document.querySelectorAll('.chip[data-theme]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-theme]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        theme = btn.dataset.theme;
        if (live) liveApply();
      });
    });

    document.getElementById('speed').addEventListener('input', e => {
      speedMs = Math.round(1000 / +e.target.value);
      document.getElementById('v-speed').textContent = e.target.value;
      if (live) liveApply();
    });

    async function applyToDisplay() {
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'matrix_rain', theme, speed: speedMs })
        });
        setStatus(r.ok ? '✓ Applied to display.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }

    async function stopDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi connection.', true);
      }
    }
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/animations.html" data-label="Animations"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
