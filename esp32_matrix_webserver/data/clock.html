<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Matrix — Clock</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="wrap" style="--accent-page:#ff3300">
  <h1>🕰️ Clock</h1>

  <div class="panel">
    <div class="layout">
      <div class="preview-frame">
        <div id="pixelGrid" style="display:grid;grid-template-columns:repeat(8,22px);grid-template-rows:repeat(8,22px);gap:3px;background:#000;border-radius:6px"></div>
        <div class="preview-label">Live preview — updates every second</div>
      </div>

      <div class="controls">
        <div class="subcard">
          <div class="subhead">Colors</div>
          <div id="palSlot"></div>
        </div>

        <div class="subcard">
          <div class="subhead">Timezone</div>
          <div class="row">
            <select id="timezone" style="background:#1e1e1e;color:#ccc;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:0.82rem;cursor:pointer">
              <option value="MST7" selected>Phoenix — MST (no DST)</option>
              <option value="PST8PDT,M3.2.0,M11.1.0">US Pacific</option>
              <option value="MST7MDT,M3.2.0,M11.1.0">US Mountain</option>
              <option value="CST6CDT,M3.2.0,M11.1.0">US Central</option>
              <option value="EST5EDT,M3.2.0,M11.1.0">US Eastern</option>
              <option value="AKST9AKDT,M3.2.0,M11.1.0">US Alaska</option>
              <option value="HST10">US Hawaii (no DST)</option>
              <option value="UTC0">UTC</option>
              <option value="GMT0BST,M3.5.0/1,M10.5.0">UK — London</option>
              <option value="CET-1CEST,M3.5.0,M10.5.0/3">Central Europe</option>
              <option value="JST-9">Japan</option>
              <option value="AEST-10AEDT,M10.1.0,M4.1.0/3">Sydney</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="startClock()">Start Clock</button>
          <button class="btn-secondary danger" onclick="stopClock()">Stop</button>
          <span class="live-dot">applies live</span>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>
  </div>

  <script src="palette.js"></script>
  <script>
    // FONT_3X3 digits 0–9 (indices 26–35 from fonts.ino)
    // [col0, col1, col2] — bit0 = top row, bit2 = bottom row
    const FONT_3X3 = [
      [7,5,7],[5,7,4],[1,7,4],[5,7,7],[3,2,7],
      [4,7,1],[7,6,6],[1,1,7],[7,7,7],[3,3,7],
    ];

    // MINI_FONT 3×5 (from clock_timer.ino)
    // [col0, col1, col2] — bit0 = top row, bit4 = bottom row
    const MINI_FONT = [
      [31,17,31],[2,31,16],[29,21,23],[17,21,31],[7,4,31],
      [23,21,29],[31,21,29],[25,5,3],[31,21,31],[23,21,31],
    ];

    let live = true, liveTimer = null;
    function liveApply() { clearTimeout(liveTimer); liveTimer = setTimeout(startClock, 180); }

    const grid = document.getElementById('pixelGrid');
    const pixels = [];
    for (let i = 0; i < 64; i++) {
      const d = document.createElement('div');
      d.style.borderRadius = '3px';
      d.style.background = '#0a0a0a';
      grid.appendChild(d);
      pixels.push(d);
    }

    function setPixel(x, y, color) {
      if (x < 0 || x > 7 || y < 0 || y > 7) return;
      pixels[y * 8 + x].style.background = color;
    }
    function clearGrid() { pixels.forEach(p => p.style.background = '#0a0a0a'); }

    function draw3x3(digit, startX, startY, color) {
      const f = FONT_3X3[digit];
      for (let col = 0; col < 3; col++)
        for (let row = 0; row < 3; row++)
          if ((f[col] >> row) & 1) setPixel(startX + col, startY + row, color);
    }

    function drawMini(digit, startX, startY, color) {
      const f = MINI_FONT[digit];
      for (let col = 0; col < 3; col++)
        for (let row = 0; row < 5; row++)
          if ((f[col] >> row) & 1) setPixel(startX + col, startY + row, color);
    }

    function renderClock(h, m, cH, cC, cM) {
      clearGrid();
      // Colon dots: col 0, rows 5 and 7
      setPixel(0, 5, cC);
      setPixel(0, 7, cC);
      // Minutes: tens at cols 1–3, units at cols 5–7 (col 4 gap), rows 3–7
      drawMini(Math.floor(m / 10), 1, 3, cM);
      drawMini(m % 10, 5, 3, cM);
      // Hours: 1–9 at cols 0–2; 10–12: '1' at cols 0–2, units at cols 4–6
      if (h <= 9) {
        draw3x3(h, 0, 0, cH);
      } else {
        draw3x3(1, 0, 0, cH);
        draw3x3(h % 10, 4, 0, cH);
      }
    }

    function updatePreview() {
      const now = new Date();
      const h = now.getHours() % 12 || 12;
      const m = now.getMinutes();
      const c = pal.get();                 // [hours, minutes, colon]
      renderClock(h, m, c[0], c[2], c[1]);  // renderClock(h, m, cHours, cColon, cMinutes)
    }

    // Shared palette component (S2). Order = [Hours, Minutes, Colon] → color1/2/3.
    const pal = Palette.mount('#palSlot', {
      count: 3,
      labels: ['Hours', 'Minutes', 'Colon'],
      defaults: ['#ff3300', '#00ccff', '#ffffff'],
      onChange: function () { updatePreview(); if (live) liveApply(); }
    });

    updatePreview();
    setInterval(updatePreview, 1000);

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function post(url, data) {
      try {
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        return r.ok;
      } catch { return false; }
    }

    async function startClock() {
      const c = pal.get();   // [hours, minutes, colon]
      const ok = await post('/api/display/animation', {
        type:   'clock',
        color1: c[0],   // hours
        color2: c[1],   // minutes
        color3: c[2],   // colon
        tz:     document.getElementById('timezone').value   // POSIX TZ string (DST-aware)
      });
      setStatus(ok ? 'Clock started. NTP sync may take a few seconds…' : 'Error — is the board reachable?', !ok);
    }

    async function stopClock() {
      const ok = await post('/api/display/clear', {});
      setStatus(ok ? 'Display cleared.' : 'Error — is the board reachable?', !ok);
    }

    document.getElementById('timezone').addEventListener('change', () => { if (live) liveApply(); });
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/" data-label="Home"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
