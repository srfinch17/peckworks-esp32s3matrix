<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chip Temp</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="app.css">
  <style>
    /* temp-specific: live readout, unit toggle, temp bar (not part of app.css) */
    .panel { max-width: 480px; }
    .group { margin-bottom: 20px; }
    .group > label { display: block; font-size: 0.75rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .toggle-row { display: flex; gap: 8px; }
    .tog-btn { border: 2px solid #333; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-size: 0.85rem; font-weight: 700; background: #1a1a1a; color: #888; transition: border-color 0.12s, color 0.12s; }
    .tog-btn.active { border-color: var(--accent-page); color: #fff; }
    .live-readout { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; margin-bottom: 20px; text-align: center; }
    .temp-big { font-size: 3rem; font-weight: 700; font-family: monospace; line-height: 1; }
    .temp-label { font-size: 0.72rem; color: var(--text-faint); margin-top: 6px; }
    .temp-bar-wrap { height: 10px; background: #1a1a1a; border-radius: 5px; margin-top: 12px; overflow: hidden; }
    .temp-bar { height: 100%; border-radius: 5px; transition: width 0.5s, background 0.5s; }
    .note { font-size: 0.72rem; color: var(--text-faint); margin-top: 16px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap" style="--accent-page:#ff7043">
  <h1>🌡 Chip Temperature</h1>

  <div class="panel">
    <div class="live-readout">
      <div class="temp-big" id="live-temp" style="color:#4499ff">—</div>
      <div class="temp-label">ESP32-S3 chip sensor · updates every 2s</div>
      <div class="temp-bar-wrap">
        <div class="temp-bar" id="temp-bar" style="width:0%;background:#4499ff"></div>
      </div>
    </div>

    <div class="group">
      <label>Display Units</label>
      <div class="toggle-row">
        <button class="tog-btn active" id="btn-F" onclick="selectUnit('F')">°F</button>
        <button class="tog-btn"        id="btn-C" onclick="selectUnit('C')">°C</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary"   onclick="sendChipTemp()">Send to Display</button>
      <button class="btn-secondary" onclick="clearDisplay()">Clear</button>
    </div>

    <div class="status" id="status"></div>

    <p class="note">
      Chip temp is the ESP32-S3 die temperature — typically 5–15°C above ambient.<br>
      Display: pulsing blue→red gradient with temperature scrolling across every 5 seconds.
    </p>
  </div>

  <script>
    let unit = 'F';
    let lastC = null;

    function selectUnit(u) {
      unit = u;
      document.getElementById('btn-F').classList.toggle('active', u === 'F');
      document.getElementById('btn-C').classList.toggle('active', u === 'C');
      if (lastC !== null) updateDisplay(lastC);
    }

    function updateDisplay(tempC) {
      lastC = tempC;
      const val = unit === 'F' ? (tempC * 9 / 5 + 32) : tempC;
      // Color: blue (cold <35°C) → red (hot >60°C)
      const t = Math.min(Math.max((tempC - 30) / 35, 0), 1);
      const r = Math.round(t * 255);
      const b = Math.round((1 - t) * 255);
      const color = `rgb(${r},0,${b})`;
      document.getElementById('live-temp').textContent = val.toFixed(1) + '°' + unit;
      document.getElementById('live-temp').style.color = color;
      document.getElementById('temp-bar').style.width = (t * 100) + '%';
      document.getElementById('temp-bar').style.background = color;
    }

    function setStatus(msg, isErr) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isErr ? ' err' : '');
    }

    async function poll() {
      try {
        const r = await fetch('/api/sensors/temperature');
        const d = await r.json();
        updateDisplay(d.celsius);
      } catch {
        document.getElementById('live-temp').textContent = '—';
      }
    }

    async function sendChipTemp() {
      try {
        const r = await fetch('/api/display/animation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'chiptemp', units: unit, speed: 60 })
        });
        setStatus(r.ok ? '✓ Chip temp running on display' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board — check WiFi.', true);
      }
    }

    async function clearDisplay() {
      try {
        const r = await fetch('/api/display/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        setStatus(r.ok ? 'Display cleared.' : 'Error: HTTP ' + r.status, !r.ok);
      } catch {
        setStatus('Cannot reach board.', true);
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
  </div>
  <script src="backnav.js" data-auto data-parent="/system.html" data-label="System"></script>
  <script src="bright.js" data-auto></script>
  <script src="header.js" data-auto></script>
</body>
</html>
