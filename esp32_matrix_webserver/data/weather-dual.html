<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Display — Weather</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d0d0d'/%3E%3Ccircle cx='4' cy='4' r='1.5' fill='%2300ff88'/%3E%3Ccircle cx='12' cy='4' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2322ddff'/%3E%3Ccircle cx='4' cy='12' r='1.5' fill='%23ffb000'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%2300ff88'/%3E%3C/svg%3E">

<body>
<div class="wrap" style="--accent-page:#22ddff">
  <h1>🌦️ Dual Display</h1>

  <div class="panel">
    <div class="subcard">
      <div class="subhead">Location</div>
      <div class="row">
        <label for="zipcode">ZIP Code</label>
        <input type="text" id="zipcode" value="85013" maxlength="10" placeholder="ZIP or city"
               style="background:#1a1a1a;border:1px solid #333;border-radius:7px;color:#e0e0e0;font-size:1rem;padding:8px 12px;width:160px;outline:none">
      </div>
    </div>

    <div class="subcard">
      <div class="subhead">Temperature Units</div>
      <div class="chips">
        <button class="chip active" id="btn-F" onclick="selectUnit('F')">°F</button>
        <button class="chip"        id="btn-C" onclick="selectUnit('C')">°C</button>
      </div>
    </div>

    <div class="subcard">
      <div class="subhead">Color Palette — sets digit colors</div>
      <div class="df-pal-grid" id="w2-pal-grid"></div>
      <div class="color-row" style="margin-top:10px">
        <div class="picker-group">
          <label>Tens</label>
          <input type="color" id="w2-c1" value="#ffa500" oninput="clearW2Preset(); if (live) liveApply();">
        </div>
        <div class="picker-group">
          <label>Units</label>
          <input type="color" id="w2-c2" value="#ffdc50" oninput="clearW2Preset(); if (live) liveApply();">
        </div>
      </div>
    </div>

    <div class="subcard">
      <div class="subhead">Icon Previews</div>
      <div class="icon-strip" id="icon-strip" style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="icon-tile" id="tile-0" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv0" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Sunny</div></div>
        <div class="icon-tile" id="tile-1" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv1" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Partly Cloudy</div></div>
        <div class="icon-tile" id="tile-2" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv2" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Cloudy</div></div>
        <div class="icon-tile" id="tile-3" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv3" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Foggy</div></div>
        <div class="icon-tile" id="tile-4" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv4" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Rainy</div></div>
        <div class="icon-tile" id="tile-5" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv5" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Snowy</div></div>
        <div class="icon-tile" id="tile-6" style="display:flex;flex-direction:column;align-items:center;gap:4px"><canvas id="cv6" width="56" height="56" style="border-radius:4px;image-rendering:pixelated"></canvas><div class="tile-label" style="font-size:0.6rem;color:#555;text-align:center;width:56px">Thunder</div></div>
      </div>

    <div class="subcard">
      <div class="subhead">Display Preview</div>
      <div class="main-preview" style="display:flex;flex-direction:column;align-items:center;gap:8px">

        <div class="cur-cond hint" id="cur-cond" style="margin-top:0">—</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="sendWeather2()">Launch on Display</button>
      <span class="live-dot">applies live</span>
    </div>
    <div class="status" id="status"></div>
    <p class="hint">Fetches weather on launch. Refreshes every 10 min. Degree symbol is always cyan.</p>
  </div>

<script>
// ── Helpers ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function hexToRgb(h) {
  const n = parseInt(h.slice(1), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

// ── State ─────────────────────────────────────────────────────
let w2Unit = 'F';
let currentCat = 0;
let currentTemp = 72;
let frame = 0;
let live = true;
let liveTimer = null;
function liveApply() {
  clearTimeout(liveTimer);
  liveTimer = setTimeout(sendWeather2, 180);
}

// Ray sparkle state: [{phase,delay}] for 5 fixed positions
const rays = [
  {phase:0, delay:2},  // (2,0)
  {phase:0, delay:10}, // (2,7)
  {phase:0, delay:5},  // (3,2)
  {phase:0, delay:18}, // (3,4)
  {phase:0, delay:13}, // (3,6)
];
const RAY_POS = [{r:2,c:0},{r:2,c:7},{r:3,c:2},{r:3,c:4},{r:3,c:6}];

// Precipitation sparkle state
const precip = [
  {col:0, phase:0, delay:0},
  {col:0, phase:0, delay:3},
  {col:0, phase:0, delay:5},
  {col:0, phase:0, delay:1},
];

// ── Font ──────────────────────────────────────────────────────
const F3 = {
  0:[7,5,7],1:[5,7,4],2:[1,7,4],3:[5,7,7],
  4:[3,2,7],5:[4,7,1],6:[7,6,6],7:[1,1,7],
  8:[7,7,7],9:[3,3,7],
};

// ── Grid builder ─────────────────────────────────────────────
function makeGrid() { return Array.from({length:8}, ()=>new Array(8).fill(null)); }

function setP(g, x, y, col) { if (x>=0&&x<8&&y>=0&&y<8) g[y][x]=col; }

function drawW2Digit(g, digit, startCol, color) {
  const b = F3[digit % 10];
  for (let c=0; c<3; c++)
    for (let r=0; r<3; r++)
      if ((b[c]>>r)&1) setP(g, startCol+c, 5+r, color);
}

function drawTemp(g, tempVal, c1, c2) {
  const v = Math.abs(tempVal);
  setP(g, 7, 4, '#00c8ff');  // degree dot — cyan
  if (v >= 100) {
    for (let r=5; r<=7; r++) setP(g, 0, r, c1);   // "1" bar
    drawW2Digit(g, Math.floor(v/10)%10, 2, c1);
    drawW2Digit(g, v%10,                5, c2);
  } else if (v >= 10) {
    drawW2Digit(g, Math.floor(v/10), 0, c1);
    drawW2Digit(g, v%10,             4, c2);
  } else {
    drawW2Digit(g, v, 3, c2);
  }
}

function drawCloud(g, col) {
  [2,3,4,5].forEach(x => setP(g,x,0,col));
  for (let x=1;x<=6;x++) setP(g,x,1,col);
  for (let x=1;x<=6;x++) setP(g,x,2,col);
}

function sinBri(phase, total) {
  return Math.round(Math.sin(phase * Math.PI / total) * 255);
}

function tickRay(i, g, col) {
  const r = rays[i];
  const pos = RAY_POS[i];
  if (r.phase > 0) {
    const bri = sinBri(r.phase, 39);
    if (bri > 0) {
      const [cr,cg,cb] = hexToRgb(col);
      const s = bri/255;
      setP(g, pos.c, pos.r, `rgb(${Math.round(cr*s)},${Math.round(cg*s)},${Math.round(cb*s)})`);
    }
    if (++r.phase >= 40) { r.phase=0; r.delay=15+Math.floor(Math.random()*30); }
  } else if (r.delay > 0) { r.delay--;
  } else { r.phase=1; }
}

function tickPrecip(i, g, col, row, pcol) {
  const p = precip[i];
  p.col = pcol;
  if (p.phase > 0) {
    const bri = sinBri(p.phase, p._total||5);
    if (bri > 0) {
      const [cr,cg,cb] = hexToRgb(col);
      const s = bri/255;
      setP(g, pcol, row, `rgb(${Math.round(cr*s)},${Math.round(cg*s)},${Math.round(cb*s)})`);
    }
    if (++p.phase >= (p._total||5)) { p.phase=0; p.delay=2+Math.floor(Math.random()*(p._gap||6)); }
  } else if (p.delay > 0) { p.delay--;
  } else { p.phase=1; }
}

// ── Icon builders ────────────────────────────────────────────
function buildSunny(g) {
  const CORE='#ffe200', TIP='#ffc000', RAY='#ff9000';
  for (let x=0;x<8;x++) setP(g,x,0,CORE);
  for (let x=1;x<=6;x++) setP(g,x,1,CORE);
  for (let x=2;x<=5;x++) setP(g,x,2,TIP);
  for (let i=0;i<5;i++) tickRay(i, g, RAY);
}

function buildPartlyCloudy(g) {
  const CORE='#ffe200', TIP='#ffc000', RAY='#ff9000', CLD='#d8e4f0';
  for (let x=0;x<8;x++) setP(g,x,0,CORE);
  for (let x=1;x<=6;x++) setP(g,x,1,CORE);
  for (let x=2;x<=5;x++) setP(g,x,2,TIP);
  for (let x=5;x<=7;x++) setP(g,x,1,CLD);
  for (let x=4;x<=7;x++) setP(g,x,2,CLD);
  tickRay(0, g, RAY); tickRay(2, g, RAY);
}

function buildCloudy(g, f) {
  const br = 120 + Math.round(Math.sin(f*0.15)*30);
  const bh = Math.min(br+15, 255);
  drawCloud(g, `rgb(${br},${br},${bh})`);
}

function buildFog(g, f) {
  for (let y=0;y<4;y++) {
    const br = 30 + Math.round(Math.sin(f*0.12 + y*0.55)*20);
    const bg = `rgb(${br},${br},${Math.min(br+10,255)})`;
    for (let x=0;x<8;x++) setP(g,x,y,bg);
  }
}

function buildRain(g) {
  const RCOLS=[1,3,5,6];
  drawCloud(g, '#d8e4f0');
  RCOLS.forEach((col,i) => {
    precip[i]._total=5; precip[i]._gap=6;
    tickPrecip(i, g, '#1166ff', 3, col);
  });
}

function buildSnow(g) {
  const SCOLS=[2,4,6];
  drawCloud(g, '#d8e4f0');
  SCOLS.forEach((col,i) => {
    precip[i]._total=9; precip[i]._gap=14;
    tickPrecip(i, g, '#88c8ff', 3, col);
  });
}

function buildThunder(g, f) {
  drawCloud(g, '#464660');
  if ((f%25) < 2) { setP(g,4,3,'#ffffb4'); setP(g,5,3,'#ffffb4'); }
}

function buildGrid(cat, c1, c2, tempVal, withTemp) {
  const g = makeGrid();
  switch(cat) {
    case 0: buildSunny(g);         break;
    case 1: buildPartlyCloudy(g);  break;
    case 2: buildCloudy(g, frame); break;
    case 3: buildFog(g, frame);    break;
    case 4: buildRain(g);          break;
    case 5: buildSnow(g);          break;
    case 6: buildThunder(g,frame); break;
    default: buildSunny(g);        break;
  }
  if (withTemp) drawTemp(g, tempVal, c1, c2);
  return g;
}

// ── Canvas painter ────────────────────────────────────────────
function paint(canvas, grid, px, rows) {
  const ctx = canvas.getContext('2d');
  const maxR = rows || 8;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (let y=0;y<maxR;y++) for (let x=0;x<8;x++) {
    const c = grid[y][x]; if (!c) continue;
    ctx.shadowColor=c; ctx.shadowBlur=3;
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.roundRect(x*px+1, y*px+1, px-2, px-2, 1); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.strokeStyle='#181818'; ctx.lineWidth=0.5;
  for (let i=0;i<=8;i++) {
    ctx.beginPath(); ctx.moveTo(i*px,0); ctx.lineTo(i*px,maxR*px); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*px); ctx.lineTo(8*px,i*px); ctx.stroke();
  }
}

// ── Animation loop ────────────────────────────────────────────
const ICON_CVS = [0,1,2,3,4,5,6].map(i => $('cv'+i));
const CAT_NAMES = ['Sunny','Partly Cloudy','Cloudy','Foggy','Rainy','Snowy','Thunder'];

function loop() {
  const c1 = $('w2-c1').value;
  const c2 = $('w2-c2').value;

  // Small icon previews (rows 0-4 only, 7px/px)
  ICON_CVS.forEach((cv, cat) => {
    const g = buildGrid(cat, c1, c2, currentTemp, false);
    paint(cv, g, 7, 4);
  });

  // Main preview (full 8×8, 18px/px)
  const gMain = buildGrid(currentCat, c1, c2, currentTemp, true);
  paint($('cv-main'), gMain, 18, 8);

  frame++;
  setTimeout(loop, 160);
}

// ── Palette ───────────────────────────────────────────────────
let w2PalIdx = -1;

  ['Hot Candy',     '#ff0050','#ff5000','#ffb400','#c80050'],

  ['Aqua',          '#0096ff','#00ffff','#00c8c8','#64c8ff'],
  ['Deep Blue',     '#0032c8','#3264ff','#00c8ff','#6432c8'],
  ['Teal',          '#00c8c8','#0096c8','#32c8ff','#006496'],
  ['Blue Purple',   '#6400ff','#0064ff','#00c8ff','#3200c8'],
  ['Ice',           '#00ffff','#00c8ff','#0096ff','#0064c8'],
  ['Violet',        '#3200c8','#6400ff','#9632ff','#c864ff'],
  ['Navy',          '#0064c8','#003296','#3296ff','#64c8ff'],
  ['Forest',        '#00c800','#32ff32','#64ff00','#009632'],
  ['Lime',          '#00ff00','#64ff00','#00c832','#32ff64'],

(function buildPalGrid() {
  const grid = $('w2-pal-grid');
  DF_PAL.forEach(([name,c1,c2,c3,c4], i) => {
    const el = document.createElement('div');
    el.className = 'df-swatch';
    el.title = name;
    el.style.background = `linear-gradient(to right,${c1} 25%,${c2} 25% 50%,${c3} 50% 75%,${c4} 75%)`;
    el.onclick = () => {
      grid.querySelectorAll('.df-swatch').forEach((s,j) => s.classList.toggle('active', j===i));
      w2PalIdx = i;
      $('w2-c1').value = c1;
      $('w2-c2').value = c3;
      if (live) liveApply();
    };
    grid.appendChild(el);
  });
})();

function clearW2Preset() {
  $('w2-pal-grid').querySelectorAll('.df-swatch').forEach(s => s.classList.remove('active'));
  w2PalIdx = -1;
}

// ── Unit toggle ───────────────────────────────────────────────
function selectUnit(u) {
  w2Unit = u;
  $('btn-F').classList.toggle('active', u==='F');
  $('btn-C').classList.toggle('active', u==='C');
  if (live) liveApply();
}

// ── Status ────────────────────────────────────────────────────
function setStatus(msg, err) {
  const el = $('status');
  el.textContent = msg;
  el.className = 'status' + (err?' err':'');
}

// ── Fetch current weather for preview ────────────────────────
async function fetchPreview() {
  try {
    const r = await fetch('/api/sensors/weather');
    const d = await r.json();
    currentCat  = d.category || 0;
    currentTemp = (w2Unit === 'F') ? (d.temp || 72) : (d.tempC || 22);
    const names = ['Sunny','Partly Cloudy','Cloudy','Foggy','Rainy','Snowy','Thunder'];
    $('cur-cond').textContent = (names[currentCat]||'') + ' · ' + currentTemp + '°' + (d.unit||'F') + ' · ZIP ' + (d.zip||'');
    // Highlight current tile (inline box-shadow on its canvas — accent page color)
    document.querySelectorAll('.icon-tile').forEach((t,i) => {
      const cv = t.querySelector('canvas');
      if (cv) cv.style.boxShadow = (i===currentCat) ? '0 0 0 2px var(--accent-page)' : 'none';
    });
  } catch { /* board not reachable */ }
}

// ── Launch ────────────────────────────────────────────────────
async function sendWeather2() {
  const zip = $('zipcode').value.trim() || '85013';
  const c1  = $('w2-c1').value;
  const c2  = $('w2-c2').value;
  setStatus('Sending…', false);
  try {
    const r = await fetch('/api/display/animation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type:'weather2', zipcode:zip, units:w2Unit, color1:c1, color2:c2, speed:80 })
    });
    if (r.ok) {
      setStatus('✓ Weather 2 running on display', false);
      setTimeout(fetchPreview, 2000);
    } else {
      setStatus('Error: HTTP ' + r.status, true);
    }
  } catch { setStatus('Cannot reach board — check WiFi.', true); }
}

window.addEventListener('DOMContentLoaded', () => {
  fetchPreview();
  loop();
});
